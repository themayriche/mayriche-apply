<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apply — Mayriche</title>
<meta name="description" content="Apply to collaborate with Mayriche. Private & Confidential.">
<meta name="theme-color" content="#2d2418">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232d2418'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='%23c4a882' font-family='serif'>M</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#2d2418;--card:#362d22;--gold:#c4a882;--goldD:#8b7355;--cream:#e8ddd0;--mt:#a68b6b;--brd:rgba(196,168,130,.12);--sf:rgba(196,168,130,.06);--gn:#5d8c72;--rd:#c06060;--fd:'Cormorant Garamond',serif;--fb:'DM Sans',sans-serif}
body{min-height:100vh;background:var(--bg);font-family:var(--fb);color:var(--cream);-webkit-font-smoothing:antialiased}
.wrap{max-width:540px;margin:0 auto;padding:0 28px}
.hd{padding:28px 0 20px;text-align:center;border-bottom:1px solid var(--brd)}
.hd h1{font-family:var(--fd);font-size:28px;font-weight:600;letter-spacing:.06em}
.hd p{font-size:9px;color:var(--mt);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}
.prog{display:flex;align-items:center;padding:22px 0 0}
.prog-s{display:flex;align-items:center;gap:8px;flex:1}
.prog-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--fd);flex-shrink:0}
.prog-dot.done{background:var(--gn);color:var(--bg)}.prog-dot.cur{background:var(--gold);color:var(--bg)}.prog-dot.future{border:1.5px solid var(--mt);color:var(--mt)}
.prog-line{flex:1;height:1px;margin:0 8px}
.form{padding:24px 0 100px}
.section{font-family:var(--fd);font-size:20px;font-weight:600;color:var(--gold);margin-bottom:4px}
.subtitle{font-size:12px;color:var(--mt);margin-bottom:20px}
.cd{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--brd);margin-bottom:16px}
.cd-title{font-size:10px;color:var(--gold);text-transform:uppercase;font-weight:600;letter-spacing:.5px;margin-bottom:12px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;color:var(--mt);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600}
.req{color:var(--rd);margin-left:3px}
.fi{width:100%;padding:11px 14px;background:var(--sf);border:1px solid var(--brd);border-radius:8px;color:var(--cream);font-size:13px;font-family:var(--fb);outline:none;appearance:auto;-webkit-appearance:auto}
.fi:focus{border-color:var(--gold)}.fi::placeholder{color:var(--mt)}
textarea.fi{resize:vertical}select.fi option{background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.radio-g{display:flex;gap:6px}
.radio-b{flex:1;padding:10px 8px;border-radius:8px;border:1px solid var(--brd);background:var(--sf);color:var(--mt);font-size:12px;cursor:pointer;font-family:var(--fb);text-align:center}
.radio-b.on{border-color:rgba(196,168,130,.4);background:rgba(196,168,130,.15);color:var(--gold);font-weight:600}
.chk{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:1px solid var(--brd);background:var(--sf);cursor:pointer;margin-bottom:4px}
.chk.on{background:rgba(196,168,130,.08);border-color:rgba(196,168,130,.25)}
.chk-box{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.chk-box.off{border:1.5px solid var(--mt);color:transparent}.chk-box.on{background:var(--gold);color:var(--bg)}
.upload-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;margin-bottom:4px;border-radius:8px;border:1px solid var(--brd);background:var(--sf)}
.upload-row.done{background:rgba(93,140,114,.06);border-color:rgba(93,140,114,.15)}
.upload-btn{padding:6px 14px;border-radius:6px;border:1px solid rgba(196,168,130,.3);background:rgba(196,168,130,.15);color:var(--gold);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.upload-btn.done{background:var(--gn);border-color:rgba(93,140,114,.3);color:var(--bg)}
.summary{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:12px}
.summary .l{color:var(--mt)}.summary .v{text-align:right}
.nav{display:flex;justify-content:space-between;margin-top:24px}
.btn-back{padding:11px 24px;border-radius:8px;border:1px solid var(--brd);background:transparent;color:var(--mt);font-size:13px;cursor:pointer;font-family:var(--fb)}
.btn-next{padding:11px 28px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gold),var(--goldD));color:var(--bg);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.btn-submit{padding:11px 28px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--gn),#4a7a62);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.err{padding:10px 14px;border-radius:8px;background:rgba(192,96,96,.1);border:1px solid rgba(192,96,96,.2);margin-bottom:16px;font-size:11px;color:var(--rd);font-weight:600}
.foot{text-align:center;margin-top:20px;font-size:10px;color:var(--mt)}
.legal{margin-top:12px;padding:12px;border-radius:8px;background:var(--sf);border:1px solid var(--brd);font-size:10px;color:var(--mt);line-height:1.6}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .4s ease}
@media(max-width:540px){.wrap{padding:0 16px}.row2,.row3{grid-template-columns:1fr}.hd h1{font-size:22px}}
</style>
</head>
<body>
<div class="hd"><h1>MAYRICHE</h1><p>Application Form</p></div>
<div class="wrap"><div class="prog" id="prog"></div><div class="form" id="fc"></div></div>
<script>
var SB_URL='https://tmbkfekyxwdveenwybwd.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtYmtmZWt5eHdkdmVlbnd5YndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODI2NzUsImV4cCI6MjA5MTM1ODY3NX0.LJQcGAIbSHqncmDLtPeAqwFbeUIdt2Y2BzO5zQh1lBc';
var UID='155edca8-551d-4516-891e-33e2348d638c';
var NAT=["Brazilian","Romanian","British","Italian","Spanish","Portuguese","Colombian","Venezuelan","Polish","Hungarian","Czech","Russian","Thai","Japanese","Chinese","Indian","Turkish","Greek","French","German","Other"];
var BT=["Slim","Slim & Fit","Athletic","Curvy","Petite","Average","Voluptuous"];
var AR=["Mayfair","Chelsea","Knightsbridge","Kensington","Marylebone","Soho","Notting Hill","Paddington","Earls Court","Bayswater","Other London","Outside London"];
var EC=["Brown","Blue","Green","Hazel","Grey","Black"];
var HC=["Blonde","Brunette","Black","Red","Auburn","Other"];
var DS=["4","6","8","10","12","14","16"];
var HA=["Instagram","WhatsApp group","Friend referral","Website","Agency","Other"];
var EX=["No experience","Less than 1 year","1-2 years","2-3 years","3-5 years","5+ years"];
var step=1,err=[],done=false;
var d={fn:'',dob:'',nat:'',ph:'',email:'',social:'',langs:'',exp:'',hear:'',ht:'',wt:'',body:'',dress:'',eye:'',hair:'',breast:'',wn:'',pa:'',area:'',inh:null,inh_addr:'',mob:null,spec:'',trav:null,over18:false,gdpr:false,nda:false,terms:false,pc:false,idf:false,adf:false,bnk:false,pht:false};
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function R(){
  var ps=[{n:1,l:'About You'},{n:2,l:'Details'},{n:3,l:'Documents'}],ph='';
  ps.forEach(function(s,i){var dn=step>s.n,c=step===s.n;ph+='<div class="prog-s"><div class="prog-dot '+(dn?'done':c?'cur':'future')+'">'+(dn?'✓':s.n)+'</div><span class="prog-lbl" style="color:'+(dn?'var(--gn)':c?'var(--gold)':'var(--mt)')+';font-weight:'+(c?'600':'400')+';font-size:11px">'+s.l+'</span></div>';if(i<2)ph+='<div class="prog-line" style="background:'+(dn?'rgba(93,140,114,.4)':'var(--brd)')+'"></div>'});
  document.getElementById('prog').innerHTML=ph;
  if(done){RS();return}
  var h='';
  if(err.length)h+='<div class="err">Please complete: '+err.join(', ')+'</div>';
  if(step===1){h+='<div class="fade"><div class="section">About You</div><div class="subtitle">Personal information. All data is kept strictly confidential.</div><div class="cd"><div class="cd-title">Personal</div>'+F('Full Name','fn','text','Your full legal name',1)+'<div class="row2">'+F('Date of Birth','dob','date','',1)+S('Nationality','nat',NAT,1)+'</div><div class="row2">'+F('Phone (WhatsApp)','ph','tel','+44 7...',1)+F('Email','email','email','your@email.com',1)+'</div>'+F('Social Media (Instagram)','social','text','@yourusername')+'</div><div class="cd"><div class="cd-title">Experience</div>'+F('Languages Spoken','langs','text','e.g. English, Portuguese, Spanish')+'<div class="row2">'+S('Years of Experience','exp',EX)+S('How did you hear about us?','hear',HA)+'</div></div></div>'}
  if(step===2){h+='<div class="fade"><div class="section">Physical & Work Details</div><div class="subtitle">Used for your professional profile.</div><div class="cd"><div class="cd-title">Physical</div><div class="row3">'+F('Height (cm)','ht','number','170',1)+F('Weight (kg)','wt','number','60',1)+S('Body Type','body',BT,1)+'</div><div class="row3">'+S('Dress Size (UK)','dress',DS)+S('Eye Colour','eye',EC)+S('Hair Colour','hair',HC)+'</div>'+F('Breast Size','breast','text','e.g. 34C')+'</div><div class="cd"><div class="cd-title">Work Preferences</div><div class="row2">'+F('Preferred Work Name','wn','text','Your alias (e.g. Amber)')+F('Profile Age','pa','number','e.g. 25')+'</div>'+S('Local Area','area',AR,1)+'<div class="row2" style="margin-top:12px"><div>'+RG('Provide In-House?','inh')+'</div><div>'+RG('Provide Mobile?','mob')+'</div></div>'+(d.inh===true?'<div style="margin-top:12px">'+F('In-House Address','inh_addr','text','Full address')+'</div>':'')+'<div style="margin-top:12px">'+RG3('Open to Travel?','trav')+'</div><div style="margin-top:12px"><div class="fg"><label class="fl">Special Requests</label><textarea class="fi" rows="3" placeholder="Anything we should know..." oninput="d.spec=this.value">'+e(d.spec)+'</textarea></div></div></div></div>'}
  if(step===3){h+='<div class="fade"><div class="section">Documents & Consent</div><div class="subtitle">Upload documents. You can also send them later via WhatsApp.</div><div class="cd"><div class="cd-title">Documents</div>'+U('Photo ID (passport or driving licence)','idf')+U('Proof of Address (utility bill)','adf')+U('Bank Statement','bnk')+U('Portfolio Photos (optional)','pht')+'<div style="margin-top:10px;padding:10px;border-radius:6px;background:var(--sf);font-size:10px;color:var(--mt);text-align:center">Can\'t upload now? Send via WhatsApp later.</div></div><div class="cd"><div class="cd-title">Consent & Agreements</div>'+CK('I confirm I am over 18 years of age','over18')+CK('I consent to data storage and processing (GDPR)','gdpr')+CK('I understand an NDA will be required','nda')+CK('I consent to professional photography','pc')+CK('I agree to terms and conditions','terms')+'<div class="legal">By submitting, you confirm all information is accurate. Data handled per GDPR. We will contact you within 24-48 hours.</div></div><div class="cd"><div class="cd-title">Summary</div><div class="summary"><span class="l">Name</span><span class="v">'+e(d.fn||'—')+'</span><span class="l">DOB</span><span class="v">'+e(d.dob||'—')+'</span><span class="l">Nationality</span><span class="v">'+e(d.nat||'—')+'</span><span class="l">Phone</span><span class="v">'+e(d.ph||'—')+'</span><span class="l">Email</span><span class="v">'+e(d.email||'—')+'</span><span class="l">Work Name</span><span class="v">'+e(d.wn||'—')+'</span><span class="l">Area</span><span class="v">'+e(d.area||'—')+'</span><span class="l">Experience</span><span class="v">'+e(d.exp||'—')+'</span></div></div></div>'}
  h+='<div class="nav">';if(step>1)h+='<button class="btn-back" onclick="P()">Back</button>';else h+='<div></div>';
  if(step<3)h+='<button class="btn-next" onclick="N()">Continue</button>';else h+='<button class="btn-submit" onclick="SU()">Submit Application</button>';
  h+='</div><div class="foot">Mayriche · Private & Confidential · GDPR Protected</div>';
  document.getElementById('fc').innerHTML=h;
}
function F(l,k,t,p,r){return'<div class="fg"><label class="fl">'+l+(r?'<span class="req">*</span>':'')+'</label><input class="fi" type="'+t+'" value="'+e(d[k]||'')+'" placeholder="'+e(p||'')+'" oninput="d.'+k+'=this.value"></div>'}
function S(l,k,o,r){var h='<div class="fg"><label class="fl">'+l+(r?'<span class="req">*</span>':'')+'</label><select class="fi" onchange="d.'+k+'=this.value"><option value="" disabled '+(d[k]?'':'selected')+'>Select...</option>';o.forEach(function(v){h+='<option value="'+e(v)+'"'+(d[k]===v?' selected':'')+' style="background:#362d22">'+e(v)+'</option>'});return h+'</select></div>'}
function RG(l,k){var h='<div class="fl">'+l+'</div><div class="radio-g">';['Yes','No'].forEach(function(o){var v=o==='Yes';var on=d[k]===v;h+='<button type="button" class="radio-b'+(on?' on':'')+'" onclick="d.'+k+'='+(v?'true':'false')+';R()">'+o+'</button>'});return h+'</div>'}
function RG3(l,k){var h='<div class="fl">'+l+'</div><div class="radio-g">';[['Yes',true],['No',false],['Depends','maybe']].forEach(function(o){var on=d[k]===o[1];h+='<button type="button" class="radio-b'+(on?' on':'')+'" onclick="d.'+k+'='+(o[1]===true?'true':o[1]===false?'false':'"maybe"')+';R()">'+o[0]+'</button>'});return h+'</div>'}
function CK(l,k){var on=d[k];return'<div class="chk'+(on?' on':'')+'" onclick="d.'+k+'=!d.'+k+';R()"><span class="chk-box '+(on?'on':'off')+'">'+(on?'✓':'')+'</span><span style="font-size:12px">'+l+'</span></div>'}
function U(l,k){var dn=d[k];return'<div class="upload-row'+(dn?' done':'')+'"><div><div style="font-size:12px">'+l+'</div>'+(dn?'<div style="font-size:10px;color:var(--gn);margin-top:2px">✓ Selected</div>':'')+'</div><label class="upload-btn'+(dn?' done':'')+'">'+(dn?'Change':'Upload')+'<input type="file" hidden onchange="d.'+k+'=true;R()"></label></div>'}
function V(){var x=[];if(step===1){if(!d.fn.trim())x.push('Name');if(!d.dob)x.push('DOB');if(!d.nat)x.push('Nationality');if(!d.ph.trim())x.push('Phone');if(!d.email.trim())x.push('Email')}if(step===2){if(!d.ht)x.push('Height');if(!d.wt)x.push('Weight');if(!d.body)x.push('Body type');if(!d.area)x.push('Area')}if(step===3){if(!d.over18)x.push('Age confirm');if(!d.gdpr)x.push('GDPR');if(!d.terms)x.push('Terms')}err=x;return!x.length}
function N(){if(V()){step++;err=[];R();scrollTo(0,0)}}
function P(){step--;err=[];R();scrollTo(0,0)}
function SU(){if(!V()){R();return}done=true;R();SV()}
function RS(){var ref='APP-'+Date.now().toString(36).toUpperCase();document.getElementById('fc').innerHTML='<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center" class="fade"><div style="max-width:440px"><div style="width:64px;height:64px;border-radius:50%;background:rgba(93,140,114,.1);border:2px solid rgba(93,140,114,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:24px;color:var(--gn)">✓</div><div style="font-family:var(--fd);font-size:28px;font-weight:600;margin-bottom:8px">Application Received</div><p style="font-size:13px;color:var(--mt);line-height:1.6;margin-bottom:24px">Thank you, '+e(d.fn.split(' ')[0])+'. We will review within 24-48 hours and contact you via WhatsApp or email.</p><div style="padding:16px;border-radius:10px;background:var(--sf);border:1px solid var(--brd);text-align:left"><div style="font-size:10px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">What happens next</div><div style="font-size:12px;line-height:1.8">1. Application review<br>2. Phone or video interview<br>3. Trial session (if approved)<br>4. Onboarding & photoshoot<br>5. Profile goes live</div></div><div style="margin-top:20px;font-size:10px;color:var(--mt)">Ref: '+ref+'</div></div></div>'}
async function SV(){try{var b={user_id:UID,lady_name:d.fn,work_name:d.wn||'',stage:'Just Applied',availability_status:'Inactive',date_of_birth:d.dob||null,nationality:d.nat||'',phone:d.ph||'',email:d.email||'',social_media:d.social||'',languages:d.langs||'',years_experience:d.exp||'',height_cm:d.ht?parseInt(d.ht):null,weight_kg:d.wt?parseInt(d.wt):null,body_type:d.body||'',dress_size:d.dress||'',eye_colour:d.eye||'',hair_colour:d.hair||'',breast_size:d.breast||'',profile_age:d.pa||'',local_area:d.area||'',provide_inhouse:d.inh===true?'Yes':d.inh===false?'No':'',inhouse_address:d.inh_addr||'',provide_mobile:d.mob===true?'Yes':d.mob===false?'No':'',open_to_travel:d.trav===true?'Yes':d.trav===false?'No':d.trav==='maybe'?'Depends':'',special_requests:d.spec||'',gdpr_signed:d.gdpr,nda_signed:d.nda,consent_form:d.pc};var r=await fetch(SB_URL+'/rest/v1/ladies',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Prefer':'return=minimal'},body:JSON.stringify(b)});if(r.ok)console.log('✓ Saved to Supabase');else console.error('Error:',await r.text())}catch(x){console.error(x)}}
R();
</script>
