<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mayriche">
<meta name="theme-color" content="#2d2418">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mayriche">
<meta name="theme-color" content="#2d2418">
<meta name="mobile-web-app-capable" content="yes">

<title>MAYRICHE — Business OS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf8f6;--sb:#2d2418;--card:#fff;--tx:#2d2418;--tx2:#8b7355;--mt:#a68b6b;--brd:rgba(139,115,85,.08);--sf:#f0ebe5;--wm:#f9f6f2;--ac:#8b7355;--acL:#c4a882;--acP:#d4c4ae;--gn:#5d8c72;--gnB:rgba(93,140,114,.1);--rd:#c06060;--rdB:rgba(192,96,96,.1);--am:#b8923e;--amB:rgba(184,146,62,.1);--bl:#6a89b0;--blB:rgba(106,137,176,.1);--fd:'Cormorant Garamond',serif;--fb:'DM Sans',system-ui,sans-serif;--r:12px;--rs:8px}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);display:flex;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;font-size:13px}
button{font-family:var(--fb);cursor:pointer}input,select,textarea{font-family:var(--fb);font-size:13px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--acP);border-radius:10px}
[contenteditable][data-placeholder]:empty:before{content:attr(data-placeholder);color:var(--acP);font-style:italic;pointer-events:none}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes bg{from{width:0}}
@keyframes mi{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes aiGlow{0%,100%{box-shadow:0 0 12px rgba(196,168,130,.3),0 0 24px rgba(196,168,130,.1);border-color:rgba(196,168,130,.3);transform:scale(1)}50%{box-shadow:0 0 24px rgba(196,168,130,.6),0 0 48px rgba(196,168,130,.25);border-color:rgba(196,168,130,.8);transform:scale(1.12)}}
@keyframes aiPulse{0%,100%{opacity:.8}50%{opacity:1}}
.au{opacity:1}.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}

#ppChannels::-webkit-scrollbar{display:none}
.sb{width:220px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;position:relative;z-index:20;transition:width .3s cubic-bezier(.4,0,.2,1),margin-left .3s cubic-bezier(.4,0,.2,1)}
.sb.collapsed{margin-left:-220px}

.sb-t{position:absolute;inset:0;opacity:.03;pointer-events:none;background-image:radial-gradient(circle at 20% 50%,var(--acL) 1px,transparent 1px);background-size:20px 20px}
.sb-h{padding:20px 16px;border-bottom:1px solid rgba(196,168,130,.15);position:relative;z-index:1}
.lg{font-family:var(--fd);font-size:20px;font-weight:600;color:#e8ddd0;letter-spacing:.04em}
.lg-s{font-size:9px;color:var(--mt);letter-spacing:.15em;margin-top:2px;text-transform:uppercase}
.nl{flex:1;padding:10px 6px;display:flex;flex-direction:column;gap:1px;position:relative;z-index:1;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--mt);font-size:12px;transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative}
.ni:hover{background:rgba(139,115,85,.08)}.ni.a{background:rgba(139,115,85,.12);color:#e8ddd0;font-weight:600}
.nic{width:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sep{height:1px;background:rgba(196,168,130,.1);margin:6px 10px}
.slb{font-size:9px;color:rgba(196,168,130,.35);letter-spacing:.1em;text-transform:uppercase;padding:6px 10px 2px;font-weight:600}
.sb-u{padding:14px 16px;border-top:1px solid rgba(196,168,130,.15);display:flex;align-items:center;gap:8px;position:relative;z-index:1}
.uav{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--acL),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.mn{flex:1;overflow:hidden;display:flex;flex-direction:column}
.hd{padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--brd);background:rgba(250,248,246,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;gap:10px}
.hd h1{font-family:var(--fd);font-size:22px;font-weight:600}
.hd-s{font-size:11px;color:var(--tx2);margin-top:1px}
.hd-a{display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:2px;background:var(--sf);padding:3px;border-radius:9px;margin-bottom:20px;width:fit-content}
.tab{border:none;background:none;padding:6px 14px;border-radius:6px;font-size:11px;font-weight:500;color:var(--tx2);transition:all .2s}
.tab:hover{background:rgba(139,115,85,.08)}.tab.a{background:var(--ac);color:#fff;font-weight:600}
.cw{flex:1;overflow-y:auto}.ct{padding:20px 28px 80px;max-width:1200px;margin:0 auto;width:100%;box-sizing:border-box}#page{min-height:400px;animation:none}
.kr{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kp{background:var(--card);border-radius:var(--r);padding:16px;border:1px solid var(--brd);transition:all .3s}
.kp:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(139,115,85,.1)}
.kl{font-size:10px;color:var(--tx2);font-weight:500;letter-spacing:.03em;margin-bottom:6px}
.kv{font-family:var(--fd);font-size:26px;font-weight:700;line-height:1.1;margin-bottom:4px}
.km{display:flex;align-items:center;gap:5px}
.kb{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.kb.up{background:var(--gnB);color:var(--gn)}.kb.dn{background:var(--rdB);color:var(--rd)}.kb.nu{background:var(--sf);color:var(--tx2)}
.ks{font-size:10px;color:var(--mt)}
.cd{background:var(--card);border-radius:var(--r);padding:18px;border:1px solid var(--brd);margin-bottom:14px;transition:box-shadow .3s}
.cd:hover{box-shadow:0 6px 24px rgba(139,115,85,.08)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct-t{font-size:14px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g23{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;color:var(--mt);font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:7px 10px;border-bottom:1px solid var(--brd)}
td{padding:8px 10px;border-bottom:1px solid rgba(139,115,85,.03);font-size:12px}
tr:hover td{background:rgba(139,115,85,.015)}
.tb{font-weight:600}.tg{color:var(--gn);font-weight:600}.tr{color:var(--rd);font-weight:600}.ta{color:var(--am);font-weight:600}.tm{color:var(--mt)}
.bd{padding:2px 8px;border-radius:16px;font-size:10px;font-weight:600;display:inline-block}
.bd-g{background:var(--gnB);color:var(--gn)}.bd-r{background:var(--rdB);color:var(--rd)}.bd-a{background:var(--amB);color:var(--am)}.bd-b{background:var(--blB);color:var(--bl)}.bd-m{background:var(--sf);color:var(--mt)}
.bt{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);font-size:11px;font-weight:600;border:none;transition:all .2s}
.bt-p{background:var(--ac);color:#fff}.bt-p:hover{background:#6d5a43}
.bt-s{background:var(--sf);color:var(--tx2)}.bt-s:hover{background:var(--acP)}
.bt-g{background:none;color:var(--tx2);padding:4px 8px;font-size:10px}.bt-g:hover{background:var(--sf)}
.fg{margin-bottom:12px}.fl{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:4px}
.fi{width:100%;padding:7px 10px;border:1px solid rgba(139,115,85,.08);border-radius:var(--rs);background:var(--bg);font-size:12px;color:var(--tx);transition:border .2s}
.fi:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(139,115,85,.08)}
select.fi{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238b7355' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 10px center;padding-right:28px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fb{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.fb .fi{width:auto;min-width:120px;padding:5px 8px;font-size:11px}
.mo{position:fixed;inset:0;background:rgba(45,36,24,.5);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center}
.mo.sh{display:flex}
.mdd{background:var(--card);border-radius:14px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:mi .3s ease}
.mdd-h{padding:18px 20px 0;display:flex;justify-content:space-between;align-items:center}
.mdd-t{font-family:var(--fd);font-size:20px;font-weight:600}
.mdd-x{width:24px;height:24px;border-radius:6px;background:rgba(45,36,24,.08);border:1px solid rgba(45,36,24,.12);font-size:12px;color:#4a3d2e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:600}
.mdd-x:hover{background:rgba(45,36,24,.15)}
.mdd-b{padding:16px 20px}.mdd-f{padding:10px 20px 18px;display:flex;justify-content:flex-end;gap:6px}
.pb{height:5px;background:var(--sf);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;animation:bg .8s ease forwards}
.cx{position:relative;width:100%;height:200px}
.cx canvas{width:100%!important;height:100%!important}
.tp{position:absolute;background:var(--sb);color:#e8ddd0;padding:6px 10px;border-radius:7px;font-size:10px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:5;white-space:nowrap}.tp.v{opacity:1}
.mc{background:var(--card);border-radius:var(--r);border:1px solid var(--brd);padding:18px;transition:all .3s;position:relative;overflow:hidden}
.mc:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(139,115,85,.12)}
.empty-state{text-align:center;padding:60px 20px;color:var(--mt)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.empty-title{font-family:var(--fd);font-size:22px;font-weight:600;color:var(--tx);margin-bottom:6px}
.empty-text{font-size:12px;margin-bottom:16px}

.sg{display:grid;grid-template-columns:60px repeat(7,1fr);gap:1px;background:var(--brd);border-radius:8px;overflow:hidden;font-size:10px}
.sg-h{background:var(--wm);padding:6px 4px;text-align:center;font-weight:600;color:var(--tx2)}
.sg-t{background:var(--wm);padding:6px 4px;text-align:right;font-size:10px;color:var(--mt);font-weight:500}
.sg-c{background:var(--card);padding:4px;min-height:30px;display:flex;align-items:center;justify-content:center}
.sg-sl{width:100%;padding:2px 3px;border-radius:3px;text-align:center;font-size:9px;font-weight:600}

/* SCROLL REVEAL */
.sr-item{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.sr-item.visible{opacity:1;transform:translateY(0)}
/* FLOATING NAV */
.float-nav{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;z-index:50;opacity:0;transition:opacity .3s;pointer-events:none}
.float-nav.show{opacity:1;pointer-events:auto}
.float-btn{width:36px;height:36px;border-radius:50%;background:var(--sb);color:#e8ddd0;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .2s}
.float-btn:hover{transform:scale(1.1);background:var(--ac)}
/* SECTION DIVIDER */
.sec-div{text-align:center;padding:32px 0 16px;position:relative}
.sec-div::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--brd)}
.sec-div span{position:relative;background:var(--bg);padding:0 20px;font-family:var(--fd);font-size:16px;font-weight:500;color:var(--acP);font-style:italic;letter-spacing:.02em}

.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:12px;font-weight:600;z-index:9999;animation:fu .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.15);font-family:var(--fb)}.toast-ok{background:#059669;color:#fff}.toast-err{background:#ef4444;color:#fff}
/* SPOTLIGHT SEARCH */
.spot{position:fixed;inset:0;background:rgba(45,36,24,.6);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:min(20vh,140px)}
.spot.sh{display:flex}
.spot-box{width:90%;max-width:580px;background:var(--card);border-radius:16px;box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden;animation:mi .2s ease}
.spot-input{width:100%;padding:16px 20px 16px 48px;border:none;font-size:16px;font-family:var(--fb);color:var(--tx);background:transparent;outline:none}
.spot-input::placeholder{color:var(--acP)}
.spot-icon{position:absolute;left:18px;top:17px;opacity:.4}
.spot-results{max-height:50vh;overflow-y:auto;border-top:1px solid var(--brd)}
.spot-group{padding:6px 16px 2px;font-size:9px;font-weight:700;color:var(--mt);letter-spacing:.1em;text-transform:uppercase}
.spot-item{padding:10px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s;font-size:13px}
.spot-item:hover,.spot-item.sel{background:rgba(139,115,85,.08)}
.spot-item .spot-type{font-size:9px;color:var(--mt);background:var(--sf);padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.spot-item .spot-name{font-weight:600;flex:1}
.spot-item .spot-meta{font-size:10px;color:var(--mt);flex-shrink:0}
.spot-footer{padding:8px 16px;border-top:1px solid var(--brd);display:flex;gap:12px;font-size:10px;color:var(--mt)}
.spot-footer kbd{background:var(--sf);padding:1px 5px;border-radius:3px;font-size:9px;font-family:var(--fb);font-weight:600}
/* MINI CALENDAR */
.mcal{position:absolute;top:100%;left:0;margin-top:6px;background:var(--card);border:1px solid var(--brd);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.15);padding:14px;z-index:60;width:260px;animation:mi .2s ease;font-family:var(--fb)}
.mcal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.mcal-mo{font-family:var(--fd);font-size:15px;font-weight:600}
.mcal-nav{border:none;background:var(--sf);width:24px;height:24px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx2)}
.mcal-nav:hover{background:var(--acP)}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.mcal-day{font-size:8px;color:var(--mt);font-weight:600;padding:4px 0;letter-spacing:.05em}
.mcal-cell{font-size:11px;padding:5px 0;border-radius:6px;cursor:pointer;transition:all .15s;color:var(--tx)}
.mcal-cell:hover{background:rgba(139,115,85,.08)}
.mcal-cell.today{background:var(--ac);color:#fff;font-weight:700}
.mcal-cell.other{color:var(--acP)}
.mcal-cell.wk{background:rgba(139,115,85,.06);font-weight:600}
@media(max-width:1100px){.kr,.g4{grid-template-columns:repeat(3,1fr)}.g2,.g23{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}
  [style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(3,1fr)!important}
  #heroGrid{gap:3%!important}
}
@media(max-width:900px){
  [style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr)!important}
  .kr,.g4{grid-template-columns:repeat(2,1fr)}
  #heroGrid{grid-template-columns:1fr 140px 1fr!important;gap:16px!important}
  #heroGrid svg{width:120px!important;height:110px!important}
}
@media(max-width:768px){
  .sb{position:fixed;left:-220px;height:100vh;z-index:99;transition:left .3s ease}
  .sb.open{left:0}
  .sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:98}
  .sb-overlay.show{display:block}
  .hd{padding:10px 14px;padding-top:env(safe-area-inset-top,10px);flex-wrap:wrap;gap:4px;min-height:auto}
  .hd h1{font-size:16px!important}
  .hd-s{font-size:9px!important}
  #hdWeek{position:static!important;order:-1;width:100%;text-align:center;margin-bottom:2px}
  #hdWeek span{font-size:9px!important;padding:2px 6px!important}
  #hdActions{position:static!important;justify-content:center;width:100%}
  #hdActions .bt{font-size:10px!important;padding:5px 10px!important}
  .ct{padding:14px 10px 80px}
  .kr,.g4{grid-template-columns:1fr 1fr;gap:8px}
  [style*="grid-template-columns:repeat(5"]{grid-template-columns:1fr 1fr!important}
  .g2,.g23,.g3{grid-template-columns:1fr!important}
  .fr{grid-template-columns:1fr!important}
  [style*="grid-template-columns:1fr 1fr;gap:16px"]{grid-template-columns:1fr!important}
  #heroGrid{grid-template-columns:1fr!important;gap:16px!important;text-align:center}
  #heroGrid>div{align-items:center!important}
  #heroGrid [style*="border-left:2px"]{border-left:none!important;border-top:2px solid #c4a882}
  #heroGrid svg{margin:0 auto}
  .kv{font-size:20px!important}
  .kl{font-size:10px!important}
  table{font-size:11px}
  th,td{padding:6px 5px}td select{padding-right:20px!important}
  .tabs{flex-wrap:wrap}
  .float-nav{right:14px;bottom:14px}
  #menuBtn{display:flex!important}
  #sidebarToggle{display:none!important}
  #persistentPlayer{left:0!important}
  .mdd{width:95%!important;max-height:90vh!important}
  .mcal{left:50%!important;transform:translateX(-50%);width:90vw!important;max-width:280px}
  .fb{flex-direction:column}
  .fb .fi{width:100%!important;min-width:auto!important}
  [style*="max-width:560px"]{max-width:100%!important}
}

/* ═══════════════════ LADY PROFILE (DARK THEME - SCOPED) ═══════════════════ */
.lp{--lpBg:#faf8f6;--lpCard:#fff;--lpGold:#8b7355;--lpCream:#2d2418;--lpCreamMu:#6b5e52;--lpBrown:#f0ebe5;--lpTxMu:#a68b6b;--lpGn:#5d8c72;--lpGnDk:rgba(93,140,114,.1);--lpAm:#b8923e;--lpAmDk:rgba(184,146,62,.1);--lpRd:#c06060;--lpBl:#6a89b0;--lpBlDk:#1e40af;--lpPp:#9b7bc4;--lpCy:#67e8f9;--lpCyDk:#164e63;--lpBd:rgba(139,115,85,.08);--lpBdG:rgba(139,115,85,.08);background:var(--lpBg);color:var(--lpCream);font-family:'DM Sans',sans-serif;margin:-20px -28px -80px;min-height:calc(100vh - 100px);border-radius:12px;overflow:hidden}
.lp *{box-sizing:border-box}
.lp a{text-decoration:none}
.lp-wrap{max-width:1140px;margin:20px auto;background:var(--lpCard);border-radius:14px;border:1px solid var(--lpBdG);overflow:hidden;box-shadow:0 2px 12px rgba(139,115,85,.06)}
.lp-hd{padding:18px 24px 16px;border-bottom:1px solid var(--lpBdG);max-width:none;margin:0}
.lp-tabs{max-width:none;margin:0;border-bottom:1px solid var(--lpBd)}
.lp-body{padding:18px 24px 100px;max-width:none;margin:0}
.lp-back{background:none;border:1px solid var(--lpBd);border-radius:4px;color:var(--lpCreamMu);padding:4px 10px;font-size:11px;cursor:pointer;margin-bottom:14px;font-family:inherit}
.lp-hd-row{display:flex;align-items:flex-start;gap:18px}

<script>

// SUPABASE AUTH
// ════════════════════════════════════
const SUPABASE_URL='https://tmbkfekyxwdveenwybwd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtYmtmZWt5eHdkdmVlbnd5YndkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3ODI2NzUsImV4cCI6MjA5MTM1ODY3NX0.LJQcGAIbSHqncmDLtPeAqwFbeUIdt2Y2BzO5zQh1lBc';
var sb_client=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

function animateLockOpen(){
  const shackle=document.getElementById('lockShackle');
  const lock=document.getElementById('lockIcon');
  if(shackle){shackle.setAttribute('d','M22 28V18a10 10 0 0 1 20 0v0');shackle.style.transform='translateY(-4px)'}
  if(lock){lock.style.transform='scale(1.1)';setTimeout(function(){lock.style.opacity='0';lock.style.transform='scale(0.8)'},400)}
}

function animateLockShake(){
  const lock=document.getElementById('lockIcon');
  if(!lock)return;
  lock.style.animation='none';
  setTimeout(function(){lock.style.animation='shake .4s ease'},10);
}

async function doLogin(){
  var username=document.getElementById('loginEmail').value.trim();
  var pass=document.getElementById('loginPass').value;
  var errEl=document.getElementById('loginError');
  var btn=document.getElementById('loginBtn');
  
  if(!username||!pass){errEl.textContent='Enter your credentials';errEl.style.display='block';animateLockShake();return}
  
  // Convert username to email format for Supabase
  var email=username.includes('@')?username:username+'@mayriche.app';
  
  btn.textContent='Verifying...';
  btn.disabled=true;
  
  try{
    var result=await sb_client.auth.signInWithPassword({email:email,password:pass});
    
    if(result.error){
      // If user doesn't exist and this is first time, create account
      if(result.error.message.includes('Invalid login')){
        errEl.textContent='Access denied. Invalid credentials.';
      }else{
        errEl.textContent=result.error.message;
      }
      errEl.style.display='block';
      btn.textContent='Enter';
      btn.disabled=false;
      animateLockShake();
      return;
    }
    
    // Check if MFA is set up (verified factors only)
    try{
      var factors=await sb_client.auth.mfa.listFactors();
      var totpFactors=(factors.data&&factors.data.totp)?factors.data.totp:[];
      var verifiedFactors=totpFactors.filter(function(f){return f.status==='verified'});
      
      if(verifiedFactors.length>0){
        showMFAScreen('verify',verifiedFactors[0].id);
        return;
      }
    }catch(mfaErr){console.log('MFA check:',mfaErr)}
    
    // No verified MFA — enter app (set up MFA in Settings → APIs)
    enterApp();
    
  }catch(e){
    errEl.textContent='Connection error: '+(e.message||'');
    errEl.style.display='block';
    btn.textContent='Enter';

async function doMFAVerify(factorId){
  var code=document.getElementById('mfaCode').value.trim();
  var errEl=document.getElementById('mfaError');
  var btn=document.getElementById('mfaBtn');
  if(!code||code.length!==6){errEl.textContent='Enter 6-digit code';return}
  btn.textContent='Verifying...';btn.disabled=true;
  try{
    var challenge=await sb_client.auth.mfa.challenge({factorId:factorId});
    if(challenge.error){errEl.textContent=challenge.error.message;btn.textContent='Verify';btn.disabled=false;return}
    var verify=await sb_client.auth.mfa.verify({factorId:factorId,challengeId:challenge.data.id,code:code});
    if(verify.error){errEl.textContent='Wrong code — try again';document.getElementById('mfaCode').value='';btn.textContent='Verify';btn.disabled=false;document.getElementById('mfaCode').focus();return}
    enterApp();
  }catch(e){errEl.textContent='Error: '+e.message;btn.textContent='Verify';btn.disabled=false}
}

async function loadUserSettings(){

    if(res.data&&res.data.settings){

      if(s.weather_key)localStorage.setItem('mayriche_weather_key',s.weather_key);
      if(s.news_key)localStorage.setItem('mayriche_news_key',s.news_key);
      if(s.ai_lang)localStorage.setItem('mayriche_ai_lang',s.ai_lang);
      console.log('Settings loaded from Supabase');
    }
  }catch(e){console.log('Settings load error:',e)}
}

async function saveUserSetting(key,value){
  try{
    localStorage.setItem(key,value);
    var uid=await getUID();if(!uid)return;
    // Get current settings
    var res=await sb_client.from('user_settings').select('settings').eq('user_id',uid).single();
    var settings=(res.data&&res.data.settings)?res.data.settings:{};
    // Map localStorage key to settings key
    var keyMap={'mayriche_ai_key':'ai_key','mayriche_weather_key':'weather_key','mayriche_news_key':'news_key','mayriche_ai_lang':'ai_lang'};
    var sKey=keyMap[key]||key;
    settings[sKey]=value;
    // Upsert
    var upsert=await sb_client.from('user_settings').upsert({user_id:uid,settings:settings,updated_at:new Date().toISOString()},{onConflict:'user_id'});
    if(upsert.error)console.log('Settings save error:',upsert.error);
  }catch(e){console.log('Settings save error:',e)}
}

var dbCache={bookings:[],appointments:[],expenses:[],tasks:[],decisions:[],ideas:[],ladies:[],commissions:[],notes:[],messages:[],chat_messages:[],resources:[]};
var dbLoaded={};

async function loadDB(table){
  var uid=await getUID();
  if(!uid)return[];
  try{
    var res;
    if(table==='bookings'){
      var all=[],from=0,batchSize=1000,more=true;
      while(more){var r=await sb_client.from('bookings').select('*').eq('user_id',uid).is('deleted_at',null).order('booking_date',{ascending:false}).range(from,from+batchSize-1);if(r.data){all=all.concat(r.data);if(r.data.length<batchSize)more=false;else from+=batchSize}else{more=false}}
      res={data:all,error:null};
    } else {
      res=await sb_client.from(table).select('*').eq('user_id',uid).is('deleted_at',null).order('created_at',{ascending:false}).limit(5000);
    }
    if(res.error){console.log('Load error:',res.error.message);return dbCache[table]||[]}
    dbCache[table]=res.data||[];
    dbLoaded[table]=true;
    return dbCache[table];
  }catch(e){console.log('DB error:',e);return dbCache[table]||[]}
}

async function deleteRow(table,id){
  if(typeof id==='string'&&(id.startsWith('demo')||id.startsWith('da')||id.startsWith('de')||id.startsWith('dd')||id.startsWith('di')||id.startsWith('dl')||id.startsWith('dc')||id.startsWith('dn'))){
    var demos={tasks:DEMO_TASKS,appointments:DEMO_APT,expenses:DEMO_EXPENSES,decisions:DEMO_DECISIONS,ideas:DEMO_IDEAS,ladies:DEMO_LADIES,commissions:DEMO_COMMISSIONS,notes:DEMO_NOTES};
    var arr=demos[table];if(arr){var idx=arr.findIndex(function(x){return x.id===id});if(idx>-1)arr.splice(idx,1)}
    showToast('Removed!',true);renderPage();return;
  }
  var res=await sb_client.from(table).update({deleted_at:new Date().toISOString()}).eq('id',id);
  if(res.error){showToast('Error deleting','');return}
  showToast('Moved to trash',true);
  await loadDB(table);
  renderPage();
}

function fmtDate(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function fmtMoney(n){return'£'+parseFloat(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}

function renderDBTable(data,columns,table){
  if(!data||data.length===0)return'<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">No records yet</div><div class="empty-text">Use Quick Actions to add your first entry</div></div>';
  var h='<div style="overflow-x:auto"><table><tr>'+columns.map(c=>'<th>'+c.label+'</th>').join('')+'<th></th></tr>';
  data.forEach(function(row){
    h+='<tr draggable="true" ondragstart="dragTask(event,\''+row.id+'\')" ondragend="dragEnd(event)" style="cursor:grab;transition:opacity .2s">';
    columns.forEach(function(c){
      var v=row[c.key]||'—';
      if(c.type==='date')v=fmtDate(v);
      if(c.type==='money')v=fmtMoney(v);
      if(c.type==='badge')v='<span class="bd bd-m">'+v+'</span>';
      if(c.type==='status'){
        var sc=v==='paid'||v==='completed'||v==='done'||v==='active'?'bd-g':v==='pending'||v==='todo'||v==='to_do'?'bd-a':v==='in_progress'||v==='in progress'?'bd-b':'bd-m';
        var statusKey=c.key;
        v='<span class="bd '+sc+'" style="cursor:pointer" onclick="cycleStatus(\''+table+'\',\''+row.id+'\',\''+statusKey+'\')" title="Click to change">'+v+' ↻</span>';
      }
      h+='<td>'+v+'</td>';
    });
    h+='<td><button class="bt bt-g" style="color:var(--rd);font-size:9px" onclick="deleteRow(\''+table+'\',\''+row.id+'\')">✕</button></td>';
    h+='</tr>';
  });
  h+='</table></div>';
  return h;
}

function cycleStatus(table,id,key){
  var statusCycles={
    tasks:['todo','in_progress','done'],
    bookings:['pending','paid','completed'],
    appointments:['scheduled','confirmed','completed','cancelled'],
    expenses:['pending','paid'],
    decisions:['pending','done'],
    ideas:['new','in_progress','done'],
    ladies:['active','inactive'],
    commissions:['pending','paid']
  };
  var cycle=statusCycles[table]||['pending','done'];
  // Find item
  var demos={tasks:DEMO_TASKS,appointments:DEMO_APT,expenses:DEMO_EXPENSES,decisions:DEMO_DECISIONS,ideas:DEMO_IDEAS,ladies:DEMO_LADIES,commissions:DEMO_COMMISSIONS,notes:DEMO_NOTES};
  var isDemo=typeof id==='string'&&(id.startsWith('demo')||id.startsWith('da')||id.startsWith('de')||id.startsWith('dd')||id.startsWith('di')||id.startsWith('dl')||id.startsWith('dc')||id.startsWith('dn'));
  var arr=isDemo?(demos[table]||[]):(dbCache[table]||[]);
  var item=arr.find(function(x){return x.id===id});
  if(!item)return;
  var cur=item[key]||cycle[0];
  var idx=cycle.indexOf(cur);
  var next=cycle[(idx+1)%cycle.length];
  if(isDemo){
    item[key]=next;
    showToast(next,true);
    renderPage();
  }else{
    var upd={};upd[key]=next;
    sb_client.from(table).update(upd).eq('id',id).then(function(){
      loadDB(table).then(function(){showToast(next,true);renderPage()});
    });
  }
}

function renderSidebar(){

    finance:'Money',reports:'Money',

    settings:'System',trash:'System'
  };
  var lastSection='';
  let h='';
  for(const[key,mod] of Object.entries(MODULES)){
    var sec=sections[key]||'';
    if(sec!==lastSection){
      if(lastSection)h+='<div class="sep"></div>';
      h+='<div class="slb">'+sec+'</div>';
      lastSection=sec;
    }
    h+=`<button class="ni${key===curMod?' a':''}" onclick="nav('${key}')"><span class="nic">${ic(mod.icon)}</span>${mod.label}</button>`;
    if(key===curMod && mod.subs.length>0){

}

// WEATHER — OpenWeatherMap integration
var WEATHER_CACHE={};
async function fetchAllWeather(){
  var wk=localStorage.getItem('mayriche_weather_key')||'86d2b572fe89cd91595619effe0fce3d';
  if(!wk)return;
  for(var i=0;i<CITIES.length;i++){
    var c=CITIES[i];
    try{
      var res=await fetch('https://api.openweathermap.org/data/2.5/weather?lat='+c.lat+'&lon='+c.lon+'&units=metric&appid='+wk);
      var d=await res.json();
      if(d.main){
        WEATHER_CACHE[c.name]={temp:Math.round(d.main.temp),desc:d.weather[0].main.toLowerCase(),icon:d.weather[0].icon};
        var wxEl=document.getElementById('wx_'+i);
        if(wxEl)wxEl.textContent=Math.round(d.main.temp)+'° '+d.weather[0].main.toLowerCase();
        if(c.name==='London'){
          var heroWx=document.getElementById('heroWeather');
          if(heroWx)heroWx.textContent=Math.round(d.main.temp)+'°C '+d.weather[0].main.toLowerCase();
        }
      }
    }catch(e){console.log('Weather error for '+c.name,e)}
  }
}

// Dashboard clock + scroll reveal
setInterval(()=>{
  // Analog clock
  try{
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/London'}));
    const h=now.getHours()%12,m=now.getMinutes(),s=now.getSeconds();
    const hDeg=h*30+m*0.5;
    const mDeg=m*6+s*0.1;
    const sDeg=s*6;
    const hHand=document.getElementById('clockHour');
    const mHand=document.getElementById('clockMin');
    const sHand=document.getElementById('clockSec');
    if(hHand)hHand.setAttribute('transform','rotate('+hDeg+' 80 80)');
    if(mHand)mHand.setAttribute('transform','rotate('+mDeg+' 80 80)');
    if(sHand)sHand.setAttribute('transform','rotate('+sDeg+' 80 80)');
    var dt=document.getElementById('digitalTime');
    if(dt)dt.textContent=getTime('Europe/London');
  }catch(e){}
  // World clocks
  document.querySelectorAll('.wclk').forEach(el=>{
    const tz=el.dataset.tz;if(tz)el.textContent=getTime(tz);
  });
},1000);

const srObs=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');srObs.unobserve(e.target)}});
},{threshold:0.08,rootMargin:'0px 0px -30px 0px'});

function initDashScroll(){
  const cw=document.querySelector('.cw');
  if(!cw)return;
  cw.addEventListener('scroll',()=>{
    const fn=document.getElementById('floatNav');
    if(fn)fn.classList.toggle('show',cw.scrollTop>100);
  });
  document.querySelectorAll('.sr-item').forEach(el=>srObs.observe(el));
}

let stickyNotes=JSON.parse(localStorage.getItem('mayriche_sticky')||'[]');
let stickyFilter='all';
let stickyTagFilter='';

function updateStickyTime(){
  const el=document.getElementById('stickyTime');
  if(el)el.textContent=new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

function insertStickyTag(tag){
  if(!tag)return;
  const ed=document.getElementById('stickyEditor');
  if(!ed)return;
  ed.focus();
  const badge='<span contenteditable="false" style="display:inline-block;background:var(--sf);color:var(--ac);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:0 2px">'+tag+'</span>&nbsp;';
  document.execCommand('insertHTML',false,badge);
  document.getElementById('stickyTagSelect').value='';
}

function saveStickyNote(){
  const ed=document.getElementById('stickyEditor');
  if(!ed)return;
  const html=ed.innerHTML.trim();
  const text=ed.textContent.trim();
  if(!text||text==='Start writing...')return;
  const note={
    id:Date.now(),
    html:html,
    text:text,
    date:new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    tags:[]
  };
  const tagMatches=html.match(/@[\w\s.]+/g);
  if(tagMatches)note.tags=tagMatches.map(t=>t.trim());
  stickyNotes.unshift(note);
  if(stickyNotes.length>50)stickyNotes=stickyNotes.slice(0,50);
  try{localStorage.setItem('mayriche_sticky',JSON.stringify(stickyNotes))}catch(e){}
  ed.innerHTML='';
  renderStickyArchive();
}

function deleteStickyNote(id){
  stickyNotes=stickyNotes.filter(n=>n.id!==id);
  try{localStorage.setItem('mayriche_sticky',JSON.stringify(stickyNotes))}catch(e){}
  renderStickyArchive();
}

function renderStickyArchive(){
  const el=document.getElementById('stickyArchiveList');
  if(!el)return;
  const tagSel=document.getElementById('sfTag');
  if(tagSel&&tagSel.options.length<=1){
    const tags=new Set();
    stickyNotes.forEach(n=>{const m=n.html.match(/@[\w\s.]+/g);if(m)m.forEach(t=>tags.add(t.trim()))});
    tags.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tagSel.appendChild(o)});
  }
  let filtered=stickyNotes;
  if(stickyFilter==='month'){
    const now=new Date();const mo=now.toLocaleString('en-GB',{month:'short',year:'numeric'});
    filtered=stickyNotes.filter(n=>n.date.includes(mo));
  }
  if(stickyFilter==='tag'&&stickyTagFilter){
    filtered=stickyNotes.filter(n=>n.html.includes(stickyTagFilter));
  }
  if(filtered.length===0){el.innerHTML='<div style="font-size:11px;color:var(--mt);text-align:center;padding:10px">'+(stickyNotes.length===0?'No saved notes yet.':'No notes match this filter.')+'</div>';return}
  el.innerHTML=filtered.map(n=>`
    <div style="padding:10px 12px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:9px;color:var(--mt)">${n.date}</span>
        <button onclick="deleteStickyNote(${n.id})" style="border:none;background:none;color:var(--mt);cursor:pointer;font-size:10px;padding:0">x</button>
      </div>
      <div style="font-size:11px;line-height:1.6">${n.html}</div>
    </div>
  `).join('');
}

function toggleStickyArchive(){
  const arch=document.getElementById('stickyArchive');
  if(!arch)return;
  arch.style.display=arch.style.display==='none'?'block':'none';
  renderStickyArchive();
}

function renderNotifications(){
  const el=document.getElementById('notifList');
  if(!el)return;
  const notifs=[];
  
  // Appointments today
  const todayStr=new Date().toISOString().slice(0,10);const todayApts=APT.filter(a=>a.d===todayStr);
  if(todayApts.length>0)notifs.push({text:todayApts.length+' appointments today',dot:'var(--bl)',icon:'appointments',action:"nav('appointments','list')"});
  
  // Unpaid bookings
  const unpaid=BOOKINGS.filter(b=>b.paid==="Not Paid");
  if(unpaid.length>0)notifs.push({text:unpaid.length+' unpaid bookings to collect',dot:'var(--rd)',icon:'bookings',action:"nav('clients','trackers')"});
  
  // Projects in progress
  const prog=PROJ.filter(p=>p.status==="in progress");
  if(prog.length>0)notifs.push({text:prog.length+' project in progress (critical)',dot:'var(--am)',icon:'projects',action:"nav('projects','board')"});
  
  // Overdue invoices
  const overdue=INV.filter(i=>i.s==='overdue');
  if(overdue.length>0)notifs.push({text:overdue.length+' overdue invoice'+(overdue.length>1?'s':'')+' need attention',dot:'var(--rd)',icon:'invoices',action:"nav('finance','invoices')"});
  
  // Team issues - low utilization
  const lowUtil=TEAM.filter(m=>m.ut<65);
  if(lowUtil.length>0)notifs.push({text:lowUtil.map(m=>m.n).join(', ')+' underutilized ('+lowUtil[0].ut+'%)',dot:'var(--am)',icon:'team',action:"nav('team','workload')"});
  
  // Pending revenue
  const pendingRev=REV.filter(r=>r.s==='pending');
  if(pendingRev.length>0)notifs.push({text:pendingRev.length+' pending payment'+(pendingRev.length>1?'s':'')+' to follow up',dot:'var(--am)',icon:'finance',action:"nav('finance','revenue')"});
  
  // MIT from Riche App
  const richeApp=PROJ.find(p=>p.name==="Riche App"&&p.status==="in progress");
  if(richeApp)notifs.push({text:'Riche App beta review today (MIT)',dot:'var(--gn)',icon:'tasks',action:"openProjHub(3)"});
  
  // Paused projects that need attention
  const paused=PROJ.filter(p=>p.status==="paused");
  if(paused.length>0)notifs.push({text:paused.length+' paused project'+(paused.length>1?'s':'')+' awaiting decision',dot:'var(--am)',icon:'projects',action:"nav('projects','list')"});
  
  // Commission pending
  const commPending=TEAM.reduce(function(s,t){return s+Math.round(t.rv*0.2*0.4)},0);
  if(commPending>0)notifs.push({text:'Commissions pending: '+f(commPending),dot:'var(--am)',icon:'finance',action:"nav('finance','commissions')"});
  
  // Time tracking reminder
  notifs.push({text:'Log today\'s time entries',dot:'var(--bl)',icon:'time',action:"nav('time','tracker')"});
  
  // Bookings revenue this month
  var bkRev=BOOKINGS.reduce(function(s,b){return s+b.total},0);
  notifs.push({text:'Bookings revenue: '+fP(bkRev)+' this month',dot:'var(--gn)',icon:'bookings',action:"nav('clients','analytics')"});

  // Check missed work area days
  var today2=getTodayDayName();
  var dayOrd=['monday','tuesday','wednesday','thursday','friday'];
  var tIdx=dayOrd.indexOf(today2);
  if(tIdx>0){
    var chks=JSON.parse(localStorage.getItem('mayriche_areas')||'{}');
    for(var di=0;di<tIdx;di++){
      var dn=dayOrd[di];
      var dd=AREAS_DATA[dn];
      if(!dd)continue;
      var dc=chks[dn]||{};
      var doneN=dd.checklist.filter(function(_,j){return dc[j]}).length;
      if(doneN<dd.checklist.length){
        notifs.push({text:dn.charAt(0).toUpperCase()+dn.slice(1)+' ('+dd.title+') '+doneN+'/'+dd.checklist.length+' done, needs recap',dot:'var(--am)',icon:'areas',action:"nav('areas','"+dn+"')"});
      }
    }
  }

  // Show all (scrollable)
  const show=notifs;
  
  el.innerHTML=show.map(n=>`
    <div onclick="${n.action}" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:8px;border:1px solid var(--brd);cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--ac)'" onmouseout="this.style.borderColor='var(--brd)'">
      <div style="width:5px;height:5px;border-radius:50%;background:${n.dot};flex-shrink:0"></div>
      <span style="font-size:11px;flex:1;font-weight:500">${n.text}</span>
      <span style="opacity:.4">${ic(n.icon,12)}</span>
    </div>
  `).join('');
}

async function fetchCityNews(cityName){
  var nk=localStorage.getItem('mayriche_news_key')||'d1cd956d46556a7192cb78db2daea822';
  var countryCodeMap={'Paris':'fr','London':'gb','Dubai':'ae','Doha':'qa','Bucharest':'ro','Mumbai':'in','New York':'us'};
  var code=countryCodeMap[cityName];
  if(!code)return;
  var container=document.getElementById('cityNewsItems');
  if(!container)return;
  // Check cache (2 hours)
  var cacheKey='mayriche_news_'+code;
  var cached=null;
  try{
    var cachedStr=localStorage.getItem(cacheKey);
    var cacheTime=localStorage.getItem(cacheKey+'_time');
    if(cachedStr&&cacheTime&&(Date.now()-parseInt(cacheTime))<7200000){
      cached=JSON.parse(cachedStr);
    }
  }catch(e){}
  if(cached){
    renderLiveNews(container,cached,cityName);
    return;
  }
  // Fetch live from GNews
  try{
    var res=await fetch('https://gnews.io/api/v4/top-headlines?country='+code+'&max=7&apikey='+nk);
    var data=await res.json();
    if(data.articles&&data.articles.length>0){
      try{
        localStorage.setItem(cacheKey,JSON.stringify(data.articles));
        localStorage.setItem(cacheKey+'_time',Date.now().toString());
      }catch(e){}
      renderLiveNews(container,data.articles,cityName);
    }
    // If no articles or error, keep hardcoded news visible (don't clear container)
  }catch(e){console.log('News fetch error:',e)}
  // Hardcoded news stays visible as fallback
}

function renderLiveNews(container,articles,cityName){
  window._liveNews=window._liveNews||{};
  window._liveNews[cityName]=articles;
  var h='';
  articles.forEach(function(a,i){
    var safeTitle=(a.title||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var safeSrc=a.source&&a.source.name?a.source.name.replace(/&/g,'&amp;').replace(/</g,'&lt;'):'';
    h+='<div style="padding:8px 0;'+(i<articles.length-1?'border-bottom:1px solid var(--brd)':'')+';cursor:pointer;transition:background .15s" onclick="openLiveNewspaper('+i+',\''+cityName+'\')" onmouseover="this.style.background=\'var(--sf)\'" onmouseout="this.style.background=\'transparent\'">';
    if(a.image)h+='<div style="width:100%;height:100px;border-radius:6px;background:url('+a.image+') center/cover;margin-bottom:6px;opacity:.85"></div>';
    h+='<div style="font-size:12px;font-weight:600;line-height:1.4;color:var(--tx)">'+safeTitle+'</div>';
    h+='<div style="font-size:9px;color:var(--ac);margin-top:2px">'+safeSrc+(a.publishedAt?' · '+new Date(a.publishedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'')+'</div>';
    h+='</div>';
  });
  container.innerHTML=h;
}

let areaChecks=JSON.parse(localStorage.getItem('mayriche_areas')||'{}');

function toggleAreaTask(day,idx){
  if(!areaChecks[day])areaChecks[day]={};
  areaChecks[day][idx]=!areaChecks[day][idx];
  try{localStorage.setItem('mayriche_areas',JSON.stringify(areaChecks))}catch(e){}

function pgAreaDay(){
  var day=curSub;
  var a=AREAS_DATA[day];
  if(!a)return '<div style="padding:40px;text-align:center;color:var(--mt)">Select a day from the tabs above.</div>';
  var checks=areaChecks[day]||{};
  var doneCount=a.checklist.filter(function(_,i){return checks[i]}).length;
  var pct=Math.round(doneCount/a.checklist.length*100);
  var relProjects=a.projects.map(function(name){return PROJ.find(function(p){return p.name===name})}).filter(Boolean);

  var h='';

  // Hero
  h+='<div class="sr-item" style="margin-bottom:24px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
  h+='<div><div style="font-family:var(--fd);font-size:28px;font-weight:700">'+a.title+'</div>';
  h+='<div style="font-size:12px;color:var(--mt);margin-top:4px;max-width:500px">'+a.desc+'</div></div>';
  h+='<div style="text-align:right"><div style="font-size:10px;color:var(--mt);margin-bottom:4px">Owner</div>';
  h+='<div style="font-size:13px;font-weight:600">'+a.owner+'</div>';
  h+='<div style="margin-top:8px"><span style="font-family:var(--fd);font-size:24px;font-weight:700;color:'+(pct===100?'var(--gn)':'var(--ac)')+'">'+pct+'%</span>';
  h+='<span style="font-size:10px;color:var(--mt);margin-left:4px">complete</span></div></div></div>';
  // Progress bar
  h+='<div class="pb" style="margin-top:12px;height:6px"><div class="pf" style="width:'+pct+'%;background:'+(pct===100?'var(--gn)':a.color)+'"></div></div>';
  h+='</div>';

  // Quick links
  h+='<div class="sr-item" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px">';
  a.modules.forEach(function(m){
    h+='<button class="bt bt-s" onclick="'+m.action+'" style="font-size:11px">'+m.label+'</button>';
  });
  h+='</div>';

  // Checklist
  h+='<div class="sr-item cd" style="margin-bottom:24px;padding:18px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">';
  h+='<span style="font-size:13px;font-weight:600">Weekly Checklist</span>';
  h+='<span style="font-size:10px;color:var(--mt)">'+doneCount+'/'+a.checklist.length+' done</span></div>';
  a.checklist.forEach(function(t,i){
    var isDone=checks[i]||false;
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:'+(isDone?'var(--gnB)':'var(--wm)')+';border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .2s" onclick="toggleAreaTask(\''+day+'\','+i+')">';
    h+='<div style="width:18px;height:18px;border-radius:5px;border:1.5px solid '+(isDone?'var(--gn)':a.color)+';background:'+(isDone?'var(--gn)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(isDone?'<span style="color:#fff;font-size:9px;font-weight:700">+</span>':'')+'</div>';
    h+='<span style="font-size:12px;'+(isDone?'text-decoration:line-through;color:var(--mt)':'font-weight:500')+'">'+t.task+'</span>';
    h+='</div>';
  });
  h+='</div>';

  // Related projects
  if(relProjects.length>0){
    h+='<div class="sr-item" style="margin-bottom:24px">';
    h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Related Projects</div>';
    h+='<div style="display:flex;gap:10px;flex-wrap:wrap">';

      h+='<div style="min-width:200px;flex:1;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px;cursor:pointer;border-top:3px solid '+stCol+'" onclick="openProjHub('+p.id+')">';
      h+='<div style="font-size:13px;font-weight:700;margin-bottom:4px">'+p.name+'</div>';
      h+='<div style="display:flex;gap:4px;margin-bottom:6px">'+projStBd(p.status)+projPrBd(p.priority)+'</div>';
      if(p.link)h+='<div style="font-size:10px;color:var(--bl);margin-bottom:4px">'+p.link+'</div>';
      h+='<div>'+projProg(p.completed,p.allTasks)+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Workers section (for Tuesday)
  if(a.workers){
    h+='<div class="sr-item" style="margin-bottom:24px">';
    h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Workers This Week</div>';
    h+='<div class="cd" style="padding:14px"><table><tr><th>Worker</th><th>Bookings</th><th>Revenue</th><th>Avg/Booking</th><th>Paid</th><th>Unpaid</th></tr>';
    WORKERS.forEach(function(w){
      var bks=BOOKINGS.filter(function(b){return b.work===w});
      var tot=bks.reduce(function(s,b){return s+b.total},0);
      var paid=bks.filter(function(b){return b.paid==="Paid"||b.paid==="In Stripe"}).length;
      h+='<tr><td class="tb">'+w+'</td><td>'+bks.length+'</td><td class="tg">'+fP(tot)+'</td>';
      h+='<td>'+fP(Math.round(tot/(bks.length||1)))+'</td>';
      h+='<td><span class="bd bd-g">'+paid+'</span></td>';
      h+='<td><span class="bd bd-r">'+(bks.length-paid)+'</span></td></tr>';
    });
    h+='</table></div></div>';
  }

  // Team assigned
  h+='<div class="sr-item" style="margin-bottom:24px">';
  h+='<div style="font-size:13px;font-weight:600;margin-bottom:10px">Team</div>';
  h+='<div style="display:flex;gap:10px;flex-wrap:wrap">';
  TEAM.forEach(function(m){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card);border:1px solid var(--brd);border-radius:10px;min-width:140px">';
    h+='<div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,'+m.col+','+m.col+'dd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:700">'+ini(m.n)+'</div>';
    h+='<div><div style="font-size:11px;font-weight:600">'+m.n+'</div>';
    h+='<div style="font-size:9px;color:var(--mt)">'+m.rl+'</div></div></div>';
  });
  h+='</div></div>';

  return h;
}

function projStBd(s){const m={"active":"bd-g","paused":"bd-a","not started":"bd-m","in progress":"bd-b","completed":"bd-g","delayed":"bd-r"};return`<span class="bd ${m[s]||'bd-m'}">${s}</span>`}
function projPrBd(p){const m={"high":"bd-r","medium":"bd-a","low":"bd-m"};return`<span class="bd ${m[p]||'bd-m'}">${p}</span>`}
function projProg(c,t){if(t===0)return'<span style="font-size:10px;color:var(--mt)">no tasks</span>';const pct=Math.round(c/t*100);return`<div style="display:flex;align-items:center;gap:6px"><div class="pb" style="width:60px;height:6px"><div class="pf" style="width:${pct}%;background:${pct===100?'var(--gn)':pct>0?'var(--bl)':'var(--sf)'}"></div></div><span style="font-size:10px;font-weight:600">${c}/${t}</span></div>`}

// TIME TRACKING PAGES
// ════════════════════════════════════
function fmtDur(m){const h=Math.floor(m/60);const mn=m%60;return h>0?`${h}h ${mn>0?mn+'m':''}`:`${mn}m`}
function fmtTimer(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`}

function startTimer(){
  if(activeTimer)return;
  activeTimer=true;timerStart=Date.now()-timerElapsed*1000;
  timerInterval=setInterval(()=>{timerElapsed=Math.floor((Date.now()-timerStart)/1000);const el=document.getElementById('timerDisplay');if(el)el.textContent=fmtTimer(timerElapsed);const dot=document.getElementById('timerDot');if(dot)dot.style.animation='blink 1s infinite'},1000);
  renderPage();
}
function stopTimer(){
  if(!activeTimer)return;
  clearInterval(timerInterval);activeTimer=null;
  renderPage();
}
function resetTimer(){stopTimer();timerElapsed=0;renderPage()}

function qbCalc(){
  var amt=parseFloat(document.getElementById('qbAmount')?document.getElementById('qbAmount').value:250)||0;
  var sel=document.getElementById('qbSplit');
  if(!sel)return;
  var splits=[{v:60,l:'60/40'},{v:50,l:'50/50'},{v:70,l:'70/30'}];
  sel.innerHTML=splits.map(function(s){
    var lady=Math.round(amt*s.v/100);var comp=Math.round(amt*(100-s.v)/100);
    return'<option value="'+s.v+'"'+(parseInt(sel.value)===s.v?' selected':'')+'>'+s.l+' \u00b7 Lady \u00a3'+lady.toLocaleString()+' \u00b7 Company \u00a3'+comp.toLocaleString()+'</option>';
  }).join('');
}

async function quickBookSave(){
  var btn=document.getElementById('qbSaveBtn');
  var wEl=document.getElementById('qbWork');
  var pEl=document.getElementById('qbPerson');
  var prEl=document.getElementById('qbProj');
  if(!wEl||!pEl||!prEl)return;
  var w=wEl.value;var p=pEl.value;var pr=prEl.value;
  if(!w||!p||!pr){showToast('Select Work Name, Lady Name and Project',false);return}
  var data={
    client_name:w,therapist:p,
    booking_date:document.getElementById('qbDate').dataset.value||document.getElementById('qbDate').value,
    work_area:pr,service:document.getElementById('qbType').value,
    duration_minutes:parseInt(document.getElementById('qbDur').value)||60,
    price:parseFloat(document.getElementById('qbAmount').value)||0,
    payment_method:document.getElementById('qbMethod').value,
    payment_status:document.getElementById('qbStatus').value,
    notes:document.getElementById('qbNotes').value||''
  };
  if(btn){btn.style.boxShadow='0 4px 20px rgba(196,168,130,.6)';btn.innerHTML='<div style="position:absolute;left:0;top:0;height:100%;width:0;background:rgba(255,255,255,.15);animation:btnLoad 1s ease forwards;border-radius:10px"></div><div style="position:absolute;top:50%;width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 8px #fff,0 0 16px rgba(196,168,130,.8);animation:btnSpark 1s ease forwards;transform:translateY(-50%)"></div>Saving...';btn.disabled=true}
  var uid=await getUID();
  if(!uid){showToast('Not logged in',false);if(btn){btn.innerHTML='Save Booking';btn.disabled=false;btn.style.boxShadow=''}return}
  data.user_id=uid;
  var res=await sb_client.from('bookings').insert(data).select();
  if(res.error){
    showToast('Error: '+res.error.message,false);
    if(btn){btn.innerHTML='Save Booking';btn.disabled=false;btn.style.boxShadow=''}
    return;
  }
  if(res.data&&res.data[0]){
    dbCache.bookings.unshift(res.data[0]);
  }
  refreshBookings();
  if(btn){btn.innerHTML='Save Booking';btn.disabled=false;btn.style.boxShadow='0 2px 8px rgba(139,115,85,.2)'}
  showToast('Booking saved!',true);
  renderPage();
}

function bkEditCalc(dbId,field,td){
  if(!dbId||td.querySelector('input'))return;
  var row=dbCache.bookings.find(function(b){return b.id===dbId});
  if(!row)return;
  var price=parseFloat(row.price)||0;
  var curLady=Math.round(price*0.6);
  var curComp=Math.round(price*0.4);
  var val=field==='lady'?curLady:curComp;
  td.innerHTML='<input type="number" class="fi" style="font-size:11px;padding:2px 4px;width:80px" value="'+val+'">';
  var inp=td.querySelector('input');

var bkDeleteSkipConfirm=false;
async function bkDelete(dbId){
  if(!dbId)return;
  if(!bkDeleteSkipConfirm){
    var result=await new Promise(function(resolve){
      var ov=document.createElement('div');
      ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center';
      ov.innerHTML='<div style="background:var(--card);border-radius:14px;padding:24px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3)"><div style="font-family:var(--fd);font-size:15px;font-weight:600;margin-bottom:16px">Delete this booking?</div><label style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mt);cursor:pointer;margin-bottom:16px"><input type="checkbox" id="skipDeleteConfirm" style="accent-color:var(--ac)"> Don\u2019t ask me again</label><div style="display:flex;justify-content:flex-end;gap:8px"><button onclick="this.closest(\'div[style*=fixed]\').remove();resolve(false)" style="padding:6px 16px;border-radius:8px;border:1px solid var(--brd);background:var(--card);font-size:12px;cursor:pointer;font-family:var(--fb)">Cancel</button><button onclick="if(document.getElementById(\'skipDeleteConfirm\').checked)bkDeleteSkipConfirm=true;this.closest(\'div[style*=fixed]\').remove();resolve(true)" style="padding:6px 16px;border-radius:8px;border:none;background:var(--rd);color:#fff;font-size:12px;cursor:pointer;font-family:var(--fb)">Yes, Delete</button></div></div>';
      document.body.appendChild(ov);
    });
    if(!result)return;
  }
  var delRow=dbCache.bookings.find(function(b){return b.id===dbId});
  var delCopy=delRow?Object.assign({},delRow):null;
  var res=await sb_client.from('bookings').delete().eq('id',dbId);
  if(!res.error){
    if(delCopy)pushUndo({type:'delete',table:'bookings',data:delCopy});
    dbCache.bookings=dbCache.bookings.filter(function(b){return b.id!==dbId});
    refreshBookings();
    showToast('Deleted — Cmd+Z to undo',true);
    renderPage();
    renderHeader();
  } else {
    showToast('Error deleting',false);
  }
}

var undoStack=[];
function pushUndo(action){undoStack.push(action);if(undoStack.length>30)undoStack.shift()}
async function doUndo(){
  if(undoStack.length===0){showToast('Nothing to undo',false);return}
  var action=undoStack.pop();
  if(action.type==='update'){
    await sb_client.from(action.table).update(action.oldData).eq('id',action.id);
    await loadDB(action.table);refreshBookings();showToast('Undo: restored',true);renderPage();
  } else if(action.type==='insert'){
    await sb_client.from(action.table).delete().eq('id',action.id);
    await loadDB(action.table);refreshBookings();showToast('Undo: removed',true);renderPage();
  } else if(action.type==='delete'){
    await sb_client.from(action.table).insert(action.data);
    await loadDB(action.table);refreshBookings();showToast('Undo: restored',true);renderPage();
  }
}
document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='z'){e.preventDefault();doUndo()}});

async function bkEdit(dbId,field,td){
  if(!dbId)return;
  if(td.querySelector('input,select'))return;
  var row=dbCache.bookings.find(function(b){return b.id===dbId});
  if(!row)return;
  var val=row[field]||'';
  var html='';
  var done=false;
  var inp=null;
  async function save(){
    if(done)return;done=true;
    var nv=inp.value;
    if(field==='duration_minutes'||field==='price')nv=parseFloat(nv)||0;
    if(nv==val){refreshBookings();renderPage();return}
    var upd={};upd[field]=nv;
    if(field==='therapist'&&LADY_MAP[nv])upd.client_name=LADY_MAP[nv];
    if(field==='client_name'&&WORK_MAP[nv])upd.therapist=WORK_MAP[nv];
    var oldData={};for(var k in upd)oldData[k]=row[k];
    await sb_client.from('bookings').update(upd).eq('id',dbId);
    pushUndo({type:'update',table:'bookings',id:dbId,oldData:oldData});
    for(var k in upd)row[k]=upd[k];
    refreshBookings();showToast('Updated',true);renderPage();
  }
  if(field==='service')html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px;min-width:80px"><option'+(val==='In-House'||val==='in-house'?' selected':'')+'>In-House</option><option'+(val==='Mobile'||val==='mobile'?' selected':'')+'>Mobile</option></select>';
  else if(field==='duration_minutes'){
    var opts=[30,60,90,120,150,180,210,240];
    var found=opts.indexOf(parseInt(val))>-1;
    html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px">';
    opts.forEach(function(o){html+='<option value="'+o+'"'+(val==o?' selected':'')+'>'+(o>=120?Math.floor(o/60)+'h'+(o%60?' '+o%60+'m':''):o+' mins')+'</option>'});
    if(!found&&val)html+='<option value="'+val+'" selected>'+val+' mins</option>';
    html+='<option value="custom">Custom...</option></select>';
    td.innerHTML=html;
    var sel=td.querySelector('select');
    sel.addEventListener('change',function(){
      if(sel.value==='custom'){
        td.innerHTML='<div style="display:flex;gap:4px;align-items:center"><input type="number" min="0" max="24" value="1" style="width:36px;font-size:11px;padding:2px 4px;border:1px solid var(--brd);border-radius:4px;text-align:center" id="durH"><span style="font-size:10px;color:var(--mt)">h</span><input type="number" min="0" max="59" value="0" step="15" style="width:36px;font-size:11px;padding:2px 4px;border:1px solid var(--brd);border-radius:4px;text-align:center" id="durM"><span style="font-size:10px;color:var(--mt)">m</span><button style="font-size:9px;padding:2px 6px;border:1px solid var(--ac);background:var(--ac);color:#fff;border-radius:4px;cursor:pointer" onclick="var h=parseInt(document.getElementById(\'durH\').value)||0;var m=parseInt(document.getElementById(\'durM\').value)||0;var total=h*60+m;if(total>0){inp={value:total};done=false;save()}">OK</button></div>';
        document.getElementById('durH').focus();
        document.getElementById('durH').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();var h=parseInt(document.getElementById('durH').value)||0;var m=parseInt(document.getElementById('durM').value)||0;var total=h*60+m;if(total>0){inp={value:total};done=false;save()}}});
        document.getElementById('durM').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();var h=parseInt(document.getElementById('durH').value)||0;var m=parseInt(document.getElementById('durM').value)||0;var total=h*60+m;if(total>0){inp={value:total};done=false;save()}}});
      }
    });
    var inp=sel;
    return;
  }
  else if(field==='payment_method'){
    var methods=['Full Card','Full Cash','Revolut Transfer','PayPal Transfer','Crypto Transfer','Bank Transfer'];
    html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px">';
    methods.forEach(function(m){html+='<option'+(val===m?' selected':'')+'>'+m+'</option>'});
    if(methods.indexOf(val)===-1&&val)html+='<option selected>'+val+'</option>';
    html+='<option value="custom_method">Custom Method...</option></select>';
    td.innerHTML=html;
    var sel=td.querySelector('select');
    sel.addEventListener('change',function(){
      if(sel.value==='custom_method'){
        td.innerHTML='<input type="text" class="fi" style="font-size:11px;padding:2px 4px;width:140px" placeholder="e.g. \u00a3100 Card + \u00a3250 Cash">';
        var inp2=td.querySelector('input');inp2.focus();
        inp2.addEventListener('blur',function(){done=true;val='';inp=inp2;save()});
        inp2.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();done=false;val='';inp=inp2;save()}});
      }
    });
    var inp=sel;
    return;
  }
  else if(field==='payment_status')html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px"><option value="paid"'+(val==='paid'?' selected':'')+'>Paid</option><option value="not_paid"'+(val==='not_paid'||val==='pending'?' selected':'')+'>Not Paid</option></select>';
  else if(field==='work_area'){
    html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px">';
    BPROJECTS.forEach(function(p){html+='<option'+(p===val?' selected':'')+'>'+p+'</option>'});
    html+='</select>';
  }
  else if(field==='therapist'){
    html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px">';
    THERAPISTS.forEach(function(t){html+='<option'+(t===val?' selected':'')+'>'+t+'</option>'});
    html+='</select>';
  }
  else if(field==='client_name'){
    html='<select class="fi" style="font-size:11px;padding:2px 20px 2px 4px">';
    WORKERS.forEach(function(w){html+='<option'+(w===val?' selected':'')+'>'+w+'</option>'});
    html+='</select>';
  }
  else if(field==='booking_date'){
    var dEl=document.createElement('span');
    dEl.className='fi';dEl.style.cssText='font-size:11px;padding:4px 8px;cursor:pointer;display:inline-block';
    dEl.textContent=fmtDate(val);dEl.dataset.value=val;
    td.innerHTML='';td.appendChild(dEl);
    dEl.addEventListener('change',async function(){
      var nv=dEl.dataset.value;
      if(nv&&nv!==val){
        var upd={booking_date:nv};
        pushUndo({type:'update',table:'bookings',id:dbId,oldData:{booking_date:val}});
        await sb_client.from('bookings').update(upd).eq('id',dbId);
        row.booking_date=nv;
        refreshBookings();showToast('Updated',true);renderPage();
      }
    });
    openDatePicker(dEl);return;
  }
  else if(field==='price')html='<input type="number" class="fi" style="font-size:11px;padding:2px 4px;width:80px" value="'+val+'">';
  else if(field==='notes')html='<input type="text" class="fi" style="font-size:11px;padding:2px 4px;width:120px" value="'+(val||'')+'" placeholder="Notes...">';
  else html='<input type="text" class="fi" style="font-size:11px;padding:2px 4px;width:100px" value="'+val+'">';
  if(!html)return;
  td.innerHTML=html;
  inp=td.querySelector('input,select');
  if(!inp)return;
  inp.focus();
  inp.addEventListener('change',save);
  inp.addEventListener('keydown',function(e){if(e.key==='Escape'){done=true;renderPage()}if(e.key==='Enter'){e.preventDefault();save()}});
  inp.addEventListener('blur',function(){setTimeout(function(){if(!done)save()},200)});
}

function lpBday(dob){
  if(!dob)return null;
  var b=new Date(dob),t=new Date(),n=new Date(t.getFullYear(),b.getMonth(),b.getDate());
  if(n<t)n.setFullYear(n.getFullYear()+1);
  var df=Math.ceil((n-t)/(864e5));
  if(df===0)return{t:'Today!',u:true};
  if(df<=7)return{t:'In '+df+' days',u:true};
  if(df<=30)return{t:'In '+df+' days',u:false};
  return{t:n.toLocaleDateString('en-GB',{day:'numeric',month:'short'}),u:false};
}

    if(!wpMap[key])wpMap[key]={wn:b.work,proj:b.proj||'',rate:dbLady.current_rate||'',status:'Active',profileAge:dbLady.profile_age||'',link:'',description:'',photos:'',videos:'',services:[],addons:[],durations:[],bkCount:0,revenue:0};
    wpMap[key].bkCount++;
    wpMap[key].revenue+=(b.total||0);
  });
  var wpId=1;
  data.wps=Object.values(wpMap).sort(function(a,b){return b.revenue-a.revenue}).map(function(w){w.id=wpId++;return w;});
  // Also build projs from wps if empty
  if(data.projs.length===0){data.wps.forEach(function(w){if(w.proj&&data.projs.indexOf(w.proj)<0)data.projs.push(w.proj)});}
  return data;
}

// Field row renderer
function lpFR(opts){
  var label=opts.label,value=opts.value,editing=opts.editing,type=opts.type,options=opts.options,onChange=opts.onChange,link=opts.link;
  var r='<div class="lp-row"><span class="lp-row-l">'+lpE(label)+'</span><div class="lp-row-r">';
  var empty=value==null||value==='';
  if(editing&&type==='select'){
    r+='<select class="lp-sel" onchange="'+onChange+'">';
    options.forEach(function(o){r+='<option value="'+lpE(o)+'"'+(o===value?' selected':'')+'>'+lpE(o)+'</option>';});
    r+='</select>';
  } else if(editing&&type==='date'){
    r+='<input type="date" class="lp-inp" value="'+lpE(value||'')+'" onchange="'+onChange+'">';
  } else if(editing){
    r+='<input type="'+(type==='number'?'number':'text')+'" class="lp-inp" value="'+lpE(value||'')+'" onchange="'+onChange+'">';
  } else if(empty){
    r+='<span class="lp-val-m">—</span>';
  } else if(type==='date'&&value){
    r+='<span class="lp-val">'+new Date(value).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+'</span>';
  } else if(type==='check'){
    r+='<span class="lp-chk '+(value?'y':'n')+'">'+(value?'✓':'✕')+'</span>';
  } else if(type==='badge'){
    var cc=lpGC(value);
    r+='<span style="padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:'+cc.bg+';color:'+cc.t+';text-transform:uppercase">'+lpE(value)+'</span>';

    r+='<a href="'+lpE(link)+'" target="_blank" rel="noopener noreferrer" class="lp-link">'+lpE(value)+' →</a>';
  } else {
    r+='<span class="lp-val">'+lpE(value)+'</span>';
  }
  r+='</div></div>';

}

function pgBookWorkers(){

  if(wp&&wp!=='custom'){
    var yd=new Date(todayD);yd.setDate(yd.getDate()-1);
    var wkStart=new Date(todayD);wkStart.setDate(todayD.getDate()-((todayD.getDay()+6)%7));
    var lwEnd=new Date(wkStart);lwEnd.setDate(lwEnd.getDate()-1);var lwStart=new Date(lwEnd);lwStart.setDate(lwEnd.getDate()-6);
    var moStart=new Date(todayD.getFullYear(),todayD.getMonth(),1);
    var lmEnd=new Date(todayD.getFullYear(),todayD.getMonth(),0);var lmStart=new Date(todayD.getFullYear(),todayD.getMonth()-1,1);
    var yrStart=new Date(todayD.getFullYear(),0,1);
    var lyStart=new Date(todayD.getFullYear()-1,0,1);var lyEnd=new Date(todayD.getFullYear()-1,11,31);
    var fmt=function(d){return d.toLocaleDateString('en-CA')};
    if(wp==='today'){wkFrom=today;wkTo=today}
    else if(wp==='yesterday'){wkFrom=fmt(yd);wkTo=fmt(yd)}
    else if(wp==='week'){wkFrom=fmt(wkStart);wkTo=today}
    else if(wp==='lastweek'){wkFrom=fmt(lwStart);wkTo=fmt(lwEnd)}
    else if(wp==='month'){wkFrom=fmt(moStart);wkTo=today}
    else if(wp==='lastmonth'){wkFrom=fmt(lmStart);wkTo=fmt(lmEnd)}

  const byProj={};BOOKINGS.forEach(b=>{if(!byProj[b.proj])byProj[b.proj]={count:0,total:0};byProj[b.proj].count++;byProj[b.proj].total+=b.total});
  const byDur={};BOOKINGS.forEach(b=>{if(!byDur[b.dur])byDur[b.dur]={count:0,total:0};byDur[b.dur].count++;byDur[b.dur].total+=b.total});
  const avgTicket=Math.round(totalRev/BOOKINGS.length);
  const paidPct=Math.round(BOOKINGS.filter(b=>b.paid==="Paid"||b.paid==="In Stripe").length/BOOKINGS.length*100);

  return`
  <div class="kr au d1">
    <div class="kp"><div class="kl">Total Revenue</div><div class="kv">${fP(totalRev)}</div></div>
    <div class="kp"><div class="kl">Avg Ticket</div><div class="kv">${fP(avgTicket)}</div></div>
    <div class="kp"><div class="kl">Payment Rate</div><div class="kv" style="color:${paidPct>70?'var(--gn)':'var(--rd)'}">${paidPct}%</div></div>
    <div class="kp"><div class="kl">Total Bookings</div><div class="kv">${BOOKINGS.length}</div><div class="km"><span class="ks">27 days</span></div></div>
  </div>

  <div class="g2 au d2">
    <div class="cd"><div class="ct-t" style="margin-bottom:10px">Revenue by Project</div>
    ${Object.entries(byProj).sort((a,b)=>b[1].total-a[1].total).map(([p,d],i)=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:600">${p}</span><span style="font-size:12px;font-weight:700">${fP(d.total)}</span></div>
      <div class="pb" style="height:8px"><div class="pf" style="width:${(d.total/totalRev)*100}%;background:${i===0?'var(--ac)':'var(--acL)'};animation-delay:${.2+i*.1}s"></div></div>
      <div style="font-size:10px;color:var(--mt);margin-top:2px">${d.count} bookings · ${fP(Math.round(d.total/d.count))} avg</div>
    </div>`).join("")}</div>

    <div class="cd"><div class="ct-t" style="margin-bottom:10px">Revenue by Duration</div>
    ${Object.entries(byDur).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([dur,d],i)=>{const colors=["var(--ac)","var(--am)","var(--bl)"];return`<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;padding:12px;background:var(--wm);border-radius:8px">
      <div style="width:50px;height:50px;border-radius:10px;background:${colors[i]||'var(--mt)'}22;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:14px;font-weight:700;color:${colors[i]||'var(--mt)'}">${dur}'</span></div>
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${dur} minutes</div><div style="font-size:10px;color:var(--mt)">${d.count} bookings</div></div>
      <div style="text-align:right"><div style="font-size:14px;font-weight:700;font-family:var(--fd)">${fP(d.total)}</div><div style="font-size:10px;color:var(--mt)">${fP(Math.round(d.total/d.count))} avg</div></div>
    </div>`}).join("")}</div>
  </div>

  <div class="cd au d3"><div class="ct-t" style="margin-bottom:10px">Lady vs Company Split</div>
  <div style="display:flex;gap:2px;height:24px;border-radius:6px;overflow:hidden;margin-bottom:8px">
    <div style="flex:60;background:var(--gn);display:flex;align-items:center;justify-content:center"><span style="font-size:10px;font-weight:700;color:#fff">Lady 60%</span></div>
    <div style="flex:40;background:var(--am);display:flex;align-items:center;justify-content:center"><span style="font-size:10px;font-weight:700;color:#fff">Company 40%</span></div>

// BOOKING MODAL
function updateBookingCalc(){
  var amt=parseFloat(document.getElementById('bookAmount')?document.getElementById('bookAmount').value:250)||0;
  var sel=document.getElementById('bookSplit');
  if(!sel)return;
  var cur=document.getElementById('bookCurrency')?document.getElementById('bookCurrency').value:'\u00a3';
  var splits=[{v:60,l:'60/40'},{v:50,l:'50/50'},{v:70,l:'70/30'}];
  var cv=parseInt(sel.value)||60;
  sel.innerHTML=splits.map(function(s){
    var lady=Math.round(amt*s.v/100);var comp=Math.round(amt*(100-s.v)/100);
    return'<option value="'+s.v+'"'+(cv===s.v?' selected':'')+'>'+s.l+' \u00b7 Lady '+cur+lady.toLocaleString()+' \u00b7 Company '+cur+comp.toLocaleString()+'</option>';
  }).join('');
}

function pgBookAllBookings(){
  var all=BOOKINGS.slice();
  var filtered=all.slice();
  if(bkFilter.client)filtered=filtered.filter(b=>b.work===bkFilter.client);
  if(bkFilter.therapist)filtered=filtered.filter(b=>b.person===bkFilter.therapist);
  if(bkFilter.project)filtered=filtered.filter(b=>b.proj===bkFilter.project);
  if(bkFilter.type)filtered=filtered.filter(b=>b.type===bkFilter.type);
  if(bkFilter.status)filtered=filtered.filter(b=>b.paid===bkFilter.status);
  if(bkFilter.dateFrom)filtered=filtered.filter(b=>b.date>=bkFilter.dateFrom);
  if(bkFilter.dateTo)filtered=filtered.filter(b=>b.date<=bkFilter.dateTo);

  var sKey=bkFilter.sort||'date-desc';
  if(sKey==='date-desc')filtered.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(sKey==='date-asc')filtered.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(sKey==='amount-desc')filtered.sort((a,b)=>b.total-a.total);
  if(sKey==='amount-asc')filtered.sort((a,b)=>a.total-b.total);
  if(sKey==='client-asc')filtered.sort((a,b)=>(a.work||'').localeCompare(b.work||''));
  if(sKey==='therapist-asc')filtered.sort((a,b)=>(a.person||'').localeCompare(b.person||''));

  var totalRev=filtered.reduce((s,b)=>s+b.total,0);
  var ladyTotal=filtered.reduce((s,b)=>s+b.lady,0);
  var compTotal=filtered.reduce((s,b)=>s+b.company,0);

  var rows='';
  if(bkFilter.group==='therapist'){
    var byPerson={};filtered.forEach(b=>{if(!byPerson[b.person])byPerson[b.person]=[];byPerson[b.person].push(b)});
    for(var pn of Object.keys(byPerson).sort()){
      var pBooks=byPerson[pn];var pTotal=pBooks.reduce((s,b)=>s+b.total,0);
      rows+='<tr style="background:var(--wm);cursor:pointer" onclick="this.classList.toggle(\x27bk-collapsed\x27);var s=this.nextElementSibling;while(s&&!s.style.background){s.style.display=s.style.display===\x27none\x27?\x27table-row\x27:\x27none\x27;s=s.nextElementSibling}"><td colspan="12" style="padding:10px;font-weight:700;font-size:13px"><span style="color:var(--ac);margin-right:4px">\u25b8</span> '+pn+' <span style="font-weight:400;color:var(--mt);font-size:11px">('+pBooks.length+' bookings \u00b7 '+fP(pTotal)+' total)</span></td></tr>';
      pBooks.forEach(function(b){rows+=bkRow(b)});
    }
  } else if(bkFilter.group==='project'){
    var byProj={};filtered.forEach(b=>{var p=b.proj||'No Project';if(!byProj[p])byProj[p]=[];byProj[p].push(b)});
    for(var pr of Object.keys(byProj).sort()){
      var prBooks=byProj[pr];var prTotal=prBooks.reduce((s,b)=>s+b.total,0);
      rows+='<tr style="background:var(--wm);cursor:pointer" onclick="this.classList.toggle(\x27bk-collapsed\x27);var s=this.nextElementSibling;while(s&&!s.style.background){s.style.display=s.style.display===\x27none\x27?\x27table-row\x27:\x27none\x27;s=s.nextElementSibling}"><td colspan="12" style="padding:10px;font-weight:700;font-size:13px"><span style="color:var(--am);margin-right:4px">\u25b8</span> '+pr+' <span style="font-weight:400;color:var(--mt);font-size:11px">('+prBooks.length+' bookings \u00b7 '+fP(prTotal)+' total)</span></td></tr>';
      prBooks.forEach(function(b){rows+=bkRow(b)});
    }
  } else {
    filtered.forEach(function(b){rows+=bkRow(b)});
  }

  return`
  <div class="cd au d1">
    <div class="ch">
      <span class="ct-t">All Bookings</span>
      <span style="font-size:11px;color:var(--mt)">${filtered.length} of ${all.length}</span>
      <button class="bt bt-p" onclick="openBookingModal()">+ New Booking</button>
    </div>
    <div class="fb" style="flex-wrap:wrap;gap:6px;margin-bottom:10px">
      <input type="date" class="fi" style="width:130px" id="bkDateFrom" value="${bkFilter.dateFrom}" onchange="bkFilter.dateFrom=this.value;renderPage()" title="From date">
      <input type="date" class="fi" style="width:130px" id="bkDateTo" value="${bkFilter.dateTo}" onchange="bkFilter.dateTo=this.value;renderPage()" title="To date">
      <select class="fi" style="width:auto" onchange="bkFilter.client=this.value;renderPage()"><option value="">All Clients</option>${WORKERS.map(w=>'<option'+(bkFilter.client===w?' selected':'')+'>'+w+'</option>').join('')}</select>
      <select class="fi" style="width:auto" onchange="bkFilter.therapist=this.value;renderPage()"><option value="">All Therapists</option>${THERAPISTS.map(t=>'<option'+(bkFilter.therapist===t?' selected':'')+'>'+t+'</option>').join('')}</select>
      <select class="fi" style="width:auto" onchange="bkFilter.project=this.value;renderPage()"><option value="">All Projects</option>${BPROJECTS.map(p=>'<option'+(bkFilter.project===p?' selected':'')+'>'+p+'</option>').join('')}</select>
      <select class="fi" style="width:auto" onchange="bkFilter.type=this.value;renderPage()"><option value="">All Types</option><option${bkFilter.type==='in-house'?' selected':''}>In-House</option><option${bkFilter.type==='mobile'?' selected':''}>Mobile</option></select>
      <select class="fi" style="width:auto" onchange="bkFilter.status=this.value;renderPage()"><option value="">All Status</option><option${bkFilter.status==='Paid'?' selected':''}>Paid</option><option${bkFilter.status==='Not Paid'?' selected':''}>Not Paid</option></select>
      <select class="fi" style="width:auto" onchange="bkFilter.sort=this.value;renderPage()"><option value="date-desc"${bkFilter.sort==='date-desc'?' selected':''}>Newest first</option><option value="date-asc"${bkFilter.sort==='date-asc'?' selected':''}>Oldest first</option><option value="amount-desc"${bkFilter.sort==='amount-desc'?' selected':''}>Amount \u2193</option><option value="amount-asc"${bkFilter.sort==='amount-asc'?' selected':''}>Amount \u2191</option><option value="client-asc"${bkFilter.sort==='client-asc'?' selected':''}>Client A\u2013Z</option><option value="therapist-asc"${bkFilter.sort==='therapist-asc'?' selected':''}>Therapist A\u2013Z</option></select>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">
      <span style="font-size:10px;color:var(--mt)">Group:</span>
      <button class="bt ${bkFilter.group==='flat'?'bt-p':'bt-s'} bt-sm" onclick="bkFilter.group='flat';renderPage()">Flat List</button>
      <button class="bt ${bkFilter.group==='therapist'?'bt-p':'bt-s'} bt-sm" onclick="bkFilter.group='therapist';renderPage()">Per Therapist</button>
      <button class="bt ${bkFilter.group==='project'?'bt-p':'bt-s'} bt-sm" onclick="bkFilter.group='project';renderPage()">Per Project</button>
      ${(bkFilter.client||bkFilter.therapist||bkFilter.project||bkFilter.type||bkFilter.status||bkFilter.dateFrom||bkFilter.dateTo)?'<button class="bt bt-s bt-sm" style="color:var(--rd)" onclick="resetBkFilter()">\u2715 Clear Filters</button>':''}
    </div>
    <div style="overflow-x:auto"><table>
      <tr><th>Work Name</th><th>Lady Name</th><th>Date</th><th>Type</th><th>Duration</th><th>Total \u00a3</th><th>Lady 60%</th><th>Company 40%</th><th>Method</th><th>Status</th><th>Project</th><th>Notes</th><th></th></tr>
      ${rows}
      <tr style="background:var(--sb);color:#2d2418;font-weight:700">
        <td colspan="5" style="color:#2d2418">TOTAL (${filtered.length} bookings)</td>
        <td style="color:#2d2418">${fP(totalRev)}</td>
        <td style="color:var(--gn)">${fP(ladyTotal)}</td>
        <td style="color:var(--am)">${fP(compTotal)}</td>
        <td colspan="4"></td>
      </tr>
    </table></div>
  </div>`}

async function saveReview(){
  var lady=document.getElementById('revLady').value;
  if(!lady){showToast('Select a lady',false);return}
  var uid=await getUID();
  var res=await sb_client.from('reviews').insert({
    user_id:uid,
    lady_name:lady,
    rating:parseInt(document.getElementById('revRating').value)||5,
    review_text:document.getElementById('revText').value||'',
    client_name:document.getElementById('revClient').value||'Anonymous',
    review_date:new Date().toLocaleDateString('en-CA'),
    project:document.getElementById('revProj').value||''
  }).select();
  if(!res.error){
    if(res.data&&res.data[0])dbCache.reviews=(dbCache.reviews||[]).concat(res.data);
    cM();showToast('Review saved!',true);renderPage();
  } else {showToast('Error: '+res.error.message,false)}
}
