function pgTimeReports(){
  const byStaff=TEAM.map(m=>{
    const entries=TLOG.filter(e=>e.staff===m.n);
    const bill=entries.filter(e=>e.billable).reduce((s,e)=>s+e.dur,0);
    const non=entries.filter(e=>!e.billable).reduce((s,e)=>s+e.dur,0);
    const rev=entries.filter(e=>e.billable).reduce((s,e)=>s+e.rate,0);
    return{...m,bill,non,total:bill+non,rev,billPct:bill+non>0?Math.round(bill/(bill+non)*100):0};
  });
  const byProject={};TLOG.forEach(e=>{if(!byProject[e.proj])byProject[e.proj]={dur:0,rev:0,entries:0,billable:0};byProject[e.proj].dur+=e.dur;byProject[e.proj].rev+=e.billable?e.rate:0;byProject[e.proj].entries++;byProject[e.proj].billable+=e.billable?e.dur:0});
  const projArr=Object.entries(byProject).sort((a,b)=>b[1].dur-a[1].dur);

  return`
  <div class="cd au d1"><div class="ch"><span class="ct-t">Hours by Staff</span></div>

    <td class="tg">${f(m.rev)}</td>
    <td class="tb">${m.bill>0?f(Math.round(m.rev/(m.bill/60)))+'/h':'—'}</td>
  </tr>`).join("")}</table></div>

  <div class="cd au d2"><div class="ch"><span class="ct-t">Hours by Project</span></div>
  <table><tr><th>Project</th><th>Entries</th><th>Total Time</th><th>Billable Time</th><th>Revenue</th><th>% of Total</th></tr>
  ${projArr.map(([p,d])=>`<tr>
    <td class="tb"><span class="bd ${p==='Client Sessions'?'bd-g':p==='Internal'?'bd-b':'bd-m'}">${p}</span></td>
    <td>${d.entries}</td>
    <td class="tb">${fmtDur(d.dur)}</td>
    <td class="tg">${fmtDur(d.billable)}</td>
    <td class="tg">${f(d.rev)}</td>
    <td><div style="display:flex;align-items:center;gap:4px"><div class="pb" style="width:60px"><div class="pf" style="width:${(d.dur/totalDur)*100}%;background:var(--ac)"></div></div><span style="font-size:10px;font-weight:600">${Math.round(d.dur/totalDur*100)}%</span></div></td>
  </tr>`).join("")}</table></div>

  <div class="g2 au d3">
    <div class="cd"><div class="ct-t" style="margin-bottom:10px">Billable vs Non-Billable Split</div>
    ${byStaff.map((m,i)=>`<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">${m.n}</span><span style="font-size:10px;color:var(--gn);font-weight:600">${m.billPct}% billable</span></div>

    ${["07 Apr","08 Apr","09 Apr"].map((day,i)=>{
      const dayEntries=TLOG.filter(e=>e.date==="2026-04-0"+(7+i));

function pgTimeProductivity(){
  const byStaff=TEAM.map(m=>{
    const entries=TLOG.filter(e=>e.staff===m.n);
    const bill=entries.filter(e=>e.billable).reduce((s,e)=>s+e.dur,0);
    const total=entries.reduce((s,e)=>s+e.dur,0);
    const rev=entries.filter(e=>e.billable).reduce((s,e)=>s+e.rate,0);
    const sessCount=entries.filter(e=>e.billable).length;
    const avgSession=sessCount>0?Math.round(bill/sessCount):0;
    return{...m,bill,total,rev,sessCount,avgSession,billPct:total>0?Math.round(bill/total*100):0,revPerH:bill>0?Math.round(rev/(bill/60)):0};
  }).sort((a,b)=>b.revPerH-a.revPerH);

  return`
  <div class="kr au d1">
    <div class="kp"><div class="kl">Avg Billable %</div><div class="kv tg">${Math.round(byStaff.reduce((s,m)=>s+m.billPct,0)/byStaff.length)}%</div><div class="km"><span class="ks">target: 75%</span></div></div>
    <div class="kp"><div class="kl">Avg Rev/Hour</div><div class="kv">${f(Math.round(byStaff.reduce((s,m)=>s+m.revPerH,0)/byStaff.length))}</div><div class="km"><span class="ks">billable hours</span></div></div>
    <div class="kp"><div class="kl">Total Sessions</div><div class="kv">${byStaff.reduce((s,m)=>s+m.sessCount,0)}</div></div>
    <div class="kp"><div class="kl">Avg Session</div><div class="kv">${fmtDur(Math.round(byStaff.reduce((s,m)=>s+m.avgSession,0)/byStaff.length))}</div></div>
  </div>

  <div class="cd au d2"><div class="ct-t" style="margin-bottom:10px">Productivity Ranking</div>
  ${byStaff.map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px;background:${i===0?'var(--gnB)':'var(--wm)'};border-radius:10px;${i===0?'border:1px solid rgba(5,150,105,.15)':''}">
    <div style="width:24px;font-family:var(--fd);font-size:20px;font-weight:700;color:${i===0?'var(--gn)':'var(--mt)'}">${i+1}</div>
    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,${m.col},${m.col}dd);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700">${ini(m.n)}</div>
    <div style="flex:1">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700">${m.n}</span><span style="font-size:12px;font-weight:700;color:var(--gn)">${f(m.revPerH)}/h</span></div>
      <div style="display:flex;gap:14px">
        <span style="font-size:10px;color:var(--mt)">Billable: <b style="color:var(--gn)">${m.billPct}%</b></span>
        <span style="font-size:10px;color:var(--mt)">Sessions: <b>${m.sessCount}</b></span>
        <span style="font-size:10px;color:var(--mt)">Avg: <b>${fmtDur(m.avgSession)}</b></span>
        <span style="font-size:10px;color:var(--mt)">Revenue: <b style="color:var(--gn)">${f(m.rev)}</b></span>
      </div>
    </div>
  </div>`).join("")}</div>

  <div class="cd au d3"><div class="ct-t" style="margin-bottom:8px">Full Breakdown</div>
  <table><tr><th>Staff</th><th>Total Time</th><th>Billable</th><th>Bill %</th><th>Sessions</th><th>Avg Session</th><th>Revenue</th><th>Rev/Hour</th><th>Productivity</th></tr>
  ${byStaff.map(m=>{const prod=m.billPct>75?"High":m.billPct>60?"Good":"Low";const prodBd=m.billPct>75?"bd-g":m.billPct>60?"bd-a":"bd-r";
  return`<tr><td class="tb">${m.n}</td><td>${fmtDur(m.total)}</td><td class="tg">${fmtDur(m.bill)}</td>
    <td><div style="display:flex;align-items:center;gap:4px"><div class="pb" style="width:40px"><div class="pf" style="width:${m.billPct}%;background:var(--gn)"></div></div><span style="font-size:10px;font-weight:600">${m.billPct}%</span></div></td>
    <td>${m.sessCount}</td><td>${fmtDur(m.avgSession)}</td><td class="tg">${f(m.rev)}</td><td class="tb">${f(m.revPerH)}/h</td><td><span class="bd ${prodBd}">${prod}</span></td></tr>`}).join("")}</table></div>`}

function calcComm(){
  var total=parseFloat(document.getElementById('commTotal').value)||0;
  var rate=parseInt(document.getElementById('commRate').value)||40;
  var ours=total*(rate/100);
  var lady=total-ours;
  var o=document.getElementById('commOurs');
  var l=document.getElementById('commLady');
  if(o)o.textContent='£'+ours.toFixed(2);
  if(l)l.textContent='£'+lady.toFixed(2);
}

function drawLine(cv,tId,dt,mx){const pr=cv.parentElement.getBoundingClientRect(),dp=devicePixelRatio||1;cv.width=pr.width*dp;cv.height=pr.height*dp;cv.style.width=pr.width+"px";cv.style.height=pr.height+"px";const c=cv.getContext("2d");c.scale(dp,dp);const W=pr.width,H=pr.height,p={t:8,r:8,b:22,l:40},cW=W-p.l-p.r,cH=H-p.t-p.b,xs=cW/((dt.length-1)||1);function yP(v){return p.t+cH-v/mx*cH}function xP(i){return p.l+i*xs}c.strokeStyle="rgba(139,115,85,.06)";c.lineWidth=1;for(let v=0;v<=mx;v+=mx/4){const y=yP(v);c.beginPath();c.moveTo(p.l,y);c.lineTo(W-p.r,y);c.stroke();c.fillStyle="#a68b6b";c.font="9px DM Sans";c.textAlign="right";c.fillText("£"+Math.round(v/1000)+"k",p.l-4,y+3)}c.fillStyle="#a68b6b";c.font="10px DM Sans";c.textAlign="center";dt.forEach((d,i)=>c.fillText(d.l,xP(i),H-5));c.beginPath();c.moveTo(xP(0),yP(dt[0].v1));dt.forEach((d,i)=>{if(!i)return;const px=xP(i-1),py=yP(dt[i-1].v1),cx2=xP(i),cy=yP(d.v1),cp=(px+cx2)/2;c.bezierCurveTo(cp,py,cp,cy,cx2,cy)});c.lineTo(xP(dt.length-1),yP(0));c.lineTo(xP(0),yP(0));c.closePath();const g=c.createLinearGradient(0,p.t,0,H-p.b);g.addColorStop(0,"rgba(139,115,85,.18)");g.addColorStop(1,"rgba(139,115,85,0)");c.fillStyle=g;c.fill();c.beginPath();c.moveTo(xP(0),yP(dt[0].v1));dt.forEach((d,i)=>{if(!i)return;const px=xP(i-1),py=yP(dt[i-1].v1),cx2=xP(i),cy=yP(d.v1),cp=(px+cx2)/2;c.bezierCurveTo(cp,py,cp,cy,cx2,cy)});c.strokeStyle="#8b7355";c.lineWidth=2;c.stroke();if(dt[0].v2){c.beginPath();c.setLineDash([4,3]);c.moveTo(xP(0),yP(dt[0].v2));dt.forEach((d,i)=>{if(!i)return;const px=xP(i-1),py=yP(dt[i-1].v2),cx2=xP(i),cy=yP(d.v2),cp=(px+cx2)/2;c.bezierCurveTo(cp,py,cp,cy,cx2,cy)});c.strokeStyle="#d4c4ae";c.lineWidth=1.5;c.stroke();c.setLineDash([])}dt.forEach((d,i)=>{c.beginPath();c.arc(xP(i),yP(d.v1),3,0,Math.PI*2);c.fillStyle="#fff";c.fill();c.strokeStyle="#8b7355";c.lineWidth=2;c.stroke()});if(tId){const tp=document.getElementById(tId);cv.onmousemove=function(ev){const r=cv.getBoundingClientRect(),mx2=ev.clientX-r.left;let fo=false;dt.forEach((d,i)=>{if(Math.abs(mx2-xP(i))<28){tp.innerHTML=`<b>${d.l}</b><br>£${d.v1.toLocaleString()}${d.v2?'<br>Exp: £'+d.v2.toLocaleString():''}`;tp.style.left=(xP(i)-40)+"px";tp.style.top=(yP(d.v1)-50)+"px";tp.classList.add("v");fo=true}});if(!fo)tp.classList.remove("v")};cv.onmouseleave=()=>tp.classList.remove("v")}}

function drawDonut(cv){const dp=devicePixelRatio||1;cv.width=170*dp;cv.height=170*dp;cv.style.width="170px";cv.style.height="170px";const c=cv.getContext("2d");c.scale(dp,dp);const cx=85,cy=85,r=60,lw=20;const ct={};EXP.forEach(e=>{ct[e.c]=(ct[e.c]||0)+e.a});const en=Object.entries(ct).sort((a,b)=>b[1]-a[1]);const tt=en.reduce((s,e)=>s+e[1],0);const cl=["#8b7355","#a68b6b","#c4a882","#d4bc9a","#e2d0b8","#b8a88e","#c9b99a"];let st=-Math.PI/2;en.forEach((e,i)=>{const an=(e[1]/tt)*Math.PI*2;c.beginPath();c.arc(cx,cy,r,st,st+an);c.lineWidth=lw;c.strokeStyle=cl[i%cl.length];c.stroke();st+=an});c.fillStyle="#2d2418";c.font="700 16px Cormorant Garamond";c.textAlign="center";c.fillText("£"+(tt/1000).toFixed(1)+"k",cx,cy+2);c.fillStyle="#a68b6b";c.font="8px DM Sans";c.fillText("Total",cx,cy+12);const lg=document.getElementById("dL");if(lg)lg.innerHTML=en.map((e,i)=>`<div style="display:flex;align-items:center;gap:3px"><div style="width:6px;height:6px;border-radius:2px;background:${cl[i%cl.length]}"></div><span style="font-size:9px;color:var(--mt)">${e[0]} ${((e[1]/tt)*100).toFixed(0)}%</span></div>`).join("")}

function drawRing(cv,val){const dp=devicePixelRatio||1;cv.width=90*dp;cv.height=90*dp;cv.style.width="90px";cv.style.height="90px";const c=cv.getContext("2d");c.scale(dp,dp);c.beginPath();c.arc(45,45,34,0,Math.PI*2);c.lineWidth=8;c.strokeStyle="#f0ebe5";c.stroke();c.beginPath();c.arc(45,45,34,-Math.PI/2,-Math.PI/2+(val/100)*Math.PI*2);c.lineWidth=8;c.strokeStyle=uC(val);c.lineCap="round";c.stroke()}

  }catch(e){showToast('Error updating password','')}
}

async function clearAllData(){

var mcalMonth=new Date().getMonth();
var mcalYear=new Date().getFullYear();

function toggleMiniCal(btn){
  var existing=document.getElementById('mcalPopup');
  if(existing){existing.remove();return}
  // Close on outside click
  setTimeout(function(){document.addEventListener('click',closeMcalOutside,{once:true})},10);
  var popup=document.createElement('div');
  popup.className='mcal';
  popup.id='mcalPopup';
  popup.onclick=function(e){e.stopPropagation()};
  renderMcal(popup);
  btn.style.position='relative';
  btn.appendChild(popup);
}

function closeMcalOutside(e){
  var popup=document.getElementById('mcalPopup');
  if(popup&&!popup.contains(e.target))popup.remove();
}

function renderMcal(el){
  var today=new Date();
  var first=new Date(mcalYear,mcalMonth,1);
  var last=new Date(mcalYear,mcalMonth+1,0);
  var startDay=(first.getDay()+6)%7;// Mon=0
  var moName=first.toLocaleDateString('en',{month:'long',year:'numeric'});

  // Current week bounds
  var cwMon=new Date(today);cwMon.setDate(today.getDate()-((today.getDay()+6)%7));
  var cwSun=new Date(cwMon);cwSun.setDate(cwMon.getDate()+6);

  var h='<div class="mcal-hd"><button class="mcal-nav" onclick="mcalNav(-1)">◀</button><div class="mcal-mo">'+moName+'</div><button class="mcal-nav" onclick="mcalNav(1)">▶</button></div>';
  h+='<div class="mcal-grid">';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d){h+='<div class="mcal-day">'+d+'</div>'});

  // Previous month fill
  var prevLast=new Date(mcalYear,mcalMonth,0).getDate();
  for(var i=startDay-1;i>=0;i--){
    h+='<div class="mcal-cell other">'+(prevLast-i)+'</div>';
  }

  // Current month
  for(var d=1;d<=last.getDate();d++){
    var dt=new Date(mcalYear,mcalMonth,d);
    var isToday=dt.toDateString()===today.toDateString();
    var isThisWeek=dt>=cwMon&&dt<=cwSun;
    var cls='mcal-cell';
    if(isToday)cls+=' today';
    else if(isThisWeek)cls+=' wk';
    h+='<div class="'+cls+'">'+d+'</div>';
  }

  // Next month fill
  var rem=(7-((startDay+last.getDate())%7))%7;
  for(var i=1;i<=rem;i++){
    h+='<div class="mcal-cell other">'+i+'</div>';
  }
  h+='</div>';

  // Today button
  h+='<div style="margin-top:8px;text-align:center"><button class="bt bt-g" style="font-size:9px" onclick="mcalToday()">Today</button></div>';

  el.innerHTML=h;
}


// Custom Date Picker — same design as header calendar
var dpTarget=null;
var dpMonth=new Date().getMonth();
var dpYear=new Date().getFullYear();

function openDatePicker(inputEl){
  var existing=document.getElementById('dpPopup');
  if(existing)existing.remove();
  dpTarget=inputEl;
  var val=inputEl.value||inputEl.dataset.value||'';
  if(val){var parts=val.split('-');if(parts.length===3){dpYear=parseInt(parts[0]);dpMonth=parseInt(parts[1])-1}}
  var popup=document.createElement('div');
  popup.className='mcal';
  popup.id='dpPopup';
  popup.style.position='fixed';
  popup.style.zIndex='200';
  var rect=inputEl.getBoundingClientRect();
  popup.style.top=(rect.bottom+4)+'px';
  popup.style.left=rect.left+'px';
  popup.onclick=function(e){e.stopPropagation()};
  renderDP(popup);
  document.body.appendChild(popup);
  setTimeout(function(){document.addEventListener('click',closeDPOutside)},10);
}

function closeDPOutside(e){
  var popup=document.getElementById('dpPopup');
  if(popup&&!popup.contains(e.target)){popup.remove();document.removeEventListener('click',closeDPOutside)}
}

function dpNav(dir){
  dpMonth+=dir;
  if(dpMonth>11){dpMonth=0;dpYear++}
  if(dpMonth<0){dpMonth=11;dpYear--}
  var popup=document.getElementById('dpPopup');
  if(popup)renderDP(popup);
}

function dpSelect(y,m,d){
  var val=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  if(dpTarget){
    if(dpTarget.tagName==='INPUT'){dpTarget.value=fmtDate(val);dpTarget.dataset.value=val}
    else{dpTarget.dataset.value=val;dpTarget.textContent=fmtDate(val)}
    dpTarget.dispatchEvent(new Event('change'));
  }
  var popup=document.getElementById('dpPopup');
  if(popup)popup.remove();
  document.removeEventListener('click',closeDPOutside);
}

function renderDP(el){
  var today=new Date();
  var first=new Date(dpYear,dpMonth,1);
  var last=new Date(dpYear,dpMonth+1,0);
  var startDay=(first.getDay()+6)%7;
  var moName=first.toLocaleDateString('en',{month:'long',year:'numeric'});
  var selVal=dpTarget?(dpTarget.value||dpTarget.dataset.value||''):'';

  var h='<div class="mcal-hd"><button class="mcal-nav" onclick="event.stopPropagation();dpNav(-1)">\u25c0</button><div class="mcal-mo">'+moName+'</div><button class="mcal-nav" onclick="event.stopPropagation();dpNav(1)">\u25b6</button></div>';
  h+='<div class="mcal-grid">';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(function(d){h+='<div class="mcal-day">'+d+'</div>'});
  var prevLast=new Date(dpYear,dpMonth,0).getDate();
  for(var i=startDay-1;i>=0;i--)h+='<div class="mcal-cell other" onclick="dpNav(-1)">'+(prevLast-i)+'</div>';
  for(var d=1;d<=last.getDate();d++){
    var dt=dpYear+'-'+String(dpMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=dt===today.toLocaleDateString('en-CA');
    var isSel=dt===selVal;
    var cls='mcal-cell';
    if(isSel)cls+=' today';
    else if(isToday)cls+=' wk';
    h+='<div class="'+cls+'" onclick="dpSelect('+dpYear+','+dpMonth+','+d+')" style="cursor:pointer">'+d+'</div>';
  }
  var rem=(7-((startDay+last.getDate())%7))%7;
  for(var i=1;i<=rem;i++)h+='<div class="mcal-cell other" onclick="dpNav(1)">'+i+'</div>';
  h+='</div>';
  h+='<div style="text-align:center;margin-top:6px"><button class="mcal-nav" style="width:auto;padding:2px 12px;font-size:10px" onclick="dpMonth=new Date().getMonth();dpYear=new Date().getFullYear();dpSelect(dpYear,dpMonth,new Date().getDate())">Today</button></div>';
  el.innerHTML=h;
}

function mcalNav(dir){
  mcalMonth+=dir;
  if(mcalMonth>11){mcalMonth=0;mcalYear++}
  if(mcalMonth<0){mcalMonth=11;mcalYear--}
  var el=document.getElementById('mcalPopup');
  if(el)renderMcal(el);
}

function mcalToday(){
  mcalMonth=new Date().getMonth();
  mcalYear=new Date().getFullYear();
  var el=document.getElementById('mcalPopup');
  if(el)renderMcal(el);
}

document.addEventListener('keydown',function(e){

function openSpot(){

function showSpotDefault(){

  });

function doSearch(q){
  if(!q||q.length<2){showSpotDefault();return}
  q=q.toLowerCase();
  var results=[];

  // Search DB data
  var tables=['bookings','appointments','expenses','tasks','decisions','ideas','ladies','commissions','notes'];
  tables.forEach(function(table){
    var data=dbCache[table]||[];
    data.forEach(function(row){
      var searchStr=JSON.stringify(row).toLowerCase();
      if(searchStr.indexOf(q)!==-1){
        var name=row.title||row.client_name||row.name||row.lady_name||row.category||'Record';
        var meta=row.booking_date||row.appointment_date||row.expense_date||row.commission_date||row.due_date||(row.created_at||'').slice(0,10)||'';
        results.push({name:name,type:table,meta:fmtDate(meta),table:table,id:row.id});
      }
    });
  });

  // Search projects
  PROJ.forEach(function(p){
    if(p.name.toLowerCase().indexOf(q)!==-1||p.desc.toLowerCase().indexOf(q)!==-1){
      results.push({name:p.name,type:'project',meta:p.status,nav:"nav('projects','list')"});
    }
  });

  // Search team
  TEAM.forEach(function(t){
    if(t.n.toLowerCase().indexOf(q)!==-1||t.fn.toLowerCase().indexOf(q)!==-1||(t.rl||'').toLowerCase().indexOf(q)!==-1){
      results.push({name:t.fn,type:'team',meta:t.rl,nav:"nav('team','members')"});
    }
  });

  // Search modules
  var modules=[
    {name:'Dashboard',nav:"nav('dashboard')"},{name:'Bookings',nav:"nav('clients','trackers')"},
    {name:'Appointments',nav:"nav('appointments')"},{name:'Finance',nav:"nav('finance')"},
    {name:'Expenses',nav:"nav('finance','expenses')"},{name:'Commissions',nav:"nav('finance','commissions')"},
    {name:'Team',nav:"nav('team')"},{name:'Projects',nav:"nav('projects')"},
    {name:'Tasks',nav:"nav('projects','tasks')"},{name:'Settings',nav:"nav('settings')"},
    {name:'Databases',nav:"nav('databases')"},{name:'Trash',nav:"nav('trash')"},
    {name:'Profile',nav:"nav('settings','profile')"},{name:'Password',nav:"nav('settings','password')"},
    {name:'Calendar',nav:"nav('appointments','calendar')"}
  ];
  modules.forEach(function(m){
    if(m.name.toLowerCase().indexOf(q)!==-1){
      results.push({name:m.name,type:'page',meta:'',nav:m.nav});
    }
  });

  // Search quick actions
  var actions=[
    {name:'New Booking',action:'openBookingModal()'},{name:'New Appointment',action:'openAptModal()'},
    {name:'Add Expense',action:'openExpModal()'},{name:'Add Task',action:'openTaskModal()'},
    {name:'Log Decision',action:'openDecisionModal()'},{name:'Add Idea',action:'openIdeaModal()'}
  ];
  actions.forEach(function(a){
    if(a.name.toLowerCase().indexOf(q)!==-1){
      results.push({name:a.name,type:'action',meta:'',nav:a.action});
    }
  });

  // Render results
  var h='';
  if(results.length===0){
    h='<div style="padding:30px;text-align:center;color:var(--mt)"><div style="font-size:20px;margin-bottom:6px;opacity:.3"></div><div style="font-size:12px">No results for "'+q+'"</div></div>';
  }else{
    // Group by type
    var groups={};
    results.forEach(function(r){if(!groups[r.type])groups[r.type]=[];groups[r.type].push(r)});
    var idx=0;
    for(var type in groups){
      h+='<div class="spot-group">'+type+'</div>';
      groups[type].slice(0,5).forEach(function(r){
        var onclick=r.nav?r.nav:"nav('databases','"+r.table+"')";
        h+='<div class="spot-item'+(idx===spotSel?' sel':'')+'" onclick="closeSpot();'+onclick+'" data-idx="'+idx+'"><span class="spot-type">'+r.type+'</span><span class="spot-name">'+r.name+'</span><span class="spot-meta">'+r.meta+'</span></div>';
        idx++;
      });
    }
  }
  document.getElementById('spotResults').innerHTML=h;
  spotItems=document.querySelectorAll('.spot-item');
  spotSel=0;
  updateSpotSel();
}

function spotKey(e){
  if(e.key==='ArrowDown'){e.preventDefault();spotSel=Math.min(spotSel+1,spotItems.length-1);updateSpotSel()}
  if(e.key==='ArrowUp'){e.preventDefault();spotSel=Math.max(spotSel-1,0);updateSpotSel()}
  if(e.key==='Enter'){e.preventDefault();if(spotItems[spotSel])spotItems[spotSel].click()}
}

function updateSpotSel(){
  spotItems.forEach(function(el,i){el.classList.toggle('sel',i===spotSel)});
  if(spotItems[spotSel])spotItems[spotSel].scrollIntoView({block:'nearest'});
}

// TRASH MODULE
// ════════════════════════════════════
var trashSearch='';
var trashFilter='';

async function pgTrash(){
  var uid=await getUID();if(!uid)return'<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">Not logged in</div></div>';
  var tables=['bookings','appointments','expenses','tasks','decisions','ideas','ladies','commissions','notes'];
  var allTrash=[];
  for(var i=0;i<tables.length;i++){
    var res=await sb_client.from(tables[i]).select('*').eq('user_id',uid).not('deleted_at','is',null).order('deleted_at',{ascending:false});
    if(res.data){res.data.forEach(function(r){r._table=tables[i];allTrash.push(r)})}
  }
  allTrash.sort(function(a,b){return new Date(b.deleted_at)-new Date(a.deleted_at)});

  // Apply search & filter
  var filtered=allTrash.filter(function(item){
    var name=(item.title||item.client_name||item.name||item.lady_name||'').toLowerCase();
    if(trashSearch&&name.indexOf(trashSearch.toLowerCase())===-1&&JSON.stringify(item).toLowerCase().indexOf(trashSearch.toLowerCase())===-1)return false;
    if(trashFilter&&item._table!==trashFilter)return false;
    return true;
  });

  if(allTrash.length===0)return'<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">Trash is empty</div><div class="empty-text">Deleted items appear here for 90 days before permanent removal</div></div>';

  // Get unique tables for filter
  var trashTables={};allTrash.forEach(function(i){trashTables[i._table]=true});

  var h='<div class="cd au d1"><div class="ch"><span class="ct-t">Trash ('+filtered.length+(filtered.length!==allTrash.length?' / '+allTrash.length:'')+')</span><button class="bt" style="background:var(--rdB);color:var(--rd);font-size:10px" onclick="emptyTrash()">Empty Trash</button></div>';
  h+='<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">';
  h+='<input type="text" class="fi" placeholder="Search trash..." style="min-width:160px;max-width:240px" value="'+(trashSearch||'')+'" oninput="trashSearch=this.value;renderPage()">';
  h+='<select class="fi" style="width:120px" onchange="trashFilter=this.value;renderPage()"><option value="">All Types</option>';
  Object.keys(trashTables).sort().forEach(function(t){h+='<option'+(trashFilter===t?' selected':'')+'>'+t+'</option>'});
  h+='</select>';
  if(trashSearch||trashFilter)h+='<button class="bt bt-g" style="font-size:10px;color:var(--rd)" onclick="trashSearch=\'\';trashFilter=\'\';renderPage()">Clear ✕</button>';
  h+='</div>';
  h+='<table><tr><th>Type</th><th>Name</th><th>Deleted</th><th>Days left</th><th></th></tr>';
  filtered.forEach(function(item){
    var name=item.title||item.client_name||item.name||item.lady_name||'Record';
    var delDate=new Date(item.deleted_at);
    var delStr=delDate.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
    var daysLeft=90-Math.floor((Date.now()-delDate.getTime())/(1000*60*60*24));
    var daysColor=daysLeft>30?'var(--gn)':daysLeft>7?'var(--am)':'var(--rd)';
    h+='<tr>';
    h+='<td><span class="bd bd-m">'+item._table+'</span></td>';
    h+='<td class="tb">'+name+'</td>';
    h+='<td class="tm">'+delStr+'</td>';
    h+='<td><span style="font-size:10px;color:'+daysColor+';font-weight:600">'+Math.max(0,daysLeft)+' days</span></td>';
    h+='<td style="text-align:right"><button class="bt bt-s" style="font-size:10px;margin-right:4px" onclick="restoreItem(\''+item._table+'\',\''+item.id+'\')">Restore</button><button class="bt bt-g" style="color:var(--rd);font-size:10px" onclick="permanentDelete(\''+item._table+'\',\''+item.id+'\')">Delete</button></td>';
    h+='</tr>';
  });
  h+='</table></div>';
  return h;
}

async function restoreItem(table,id){
  var res=await sb_client.from(table).update({deleted_at:null}).eq('id',id);
  if(res.error){showToast('Error restoring','');return}
  showToast('Item restored!',true);
  await loadDB(table);
  renderPage();
}

async function permanentDelete(table,id){
  if(!confirm('Permanently delete? This cannot be undone.'))return;
  var res=await sb_client.from(table).delete().eq('id',id);
  if(res.error){showToast('Error deleting','');return}
  showToast('Permanently deleted',true);
  renderPage();
}

async function emptyTrash(){
  if(!confirm('Empty all trash? This cannot be undone.'))return;
  var uid=await getUID();if(!uid)return;
  var tables=['bookings','appointments','expenses','tasks','decisions','ideas','ladies','commissions','notes'];
  for(var i=0;i<tables.length;i++){
    await sb_client.from(tables[i]).delete().eq('user_id',uid).not('deleted_at','is',null);
  }
  showToast('Trash emptied',true);
  renderPage();
}

async function saveCalEvent(){
  var type=document.getElementById('calType').value;
  var title=document.getElementById('calTitle').value||'Untitled';
  var date=document.getElementById('calDate').value;
  var time=document.getElementById('calTime').value;
  var dur=parseInt(document.getElementById('calDur').value)||60;
  var loc=document.getElementById('calLoc').value;
  var notes=document.getElementById('calNotes').value;
  var ok=false;

  if(type==='appointment'||type==='meeting'){
    ok=await saveToDB('appointments',{title:title,appointment_date:date,appointment_time:time,duration_minutes:dur,location:loc,category:type,notes:notes});
  }else if(type==='task'){
    ok=await saveToDB('tasks',{title:title,due_date:date,status:'todo',priority:'medium',notes:notes,description:loc});
  }else if(type==='decision'){
    ok=await saveToDB('decisions',{title:title,status:'pending',category:'General',description:notes});
  }else if(type==='booking'){
    ok=await saveToDB('bookings',{client_name:title,booking_date:date,booking_time:time,duration_minutes:dur,notes:notes});
  }
  if(ok){cM();await loadAllDB();renderPage()}
}

async function moveTask(id,newStatus){
  // Demo task - update in memory
  if(id.startsWith('demo')){
    var t=DEMO_TASKS.find(function(x){return x.id===id});
    if(t){t.status=newStatus;showToast('Task moved!',true);renderPage()}
    return;
  }
  var res=await sb_client.from('tasks').update({status:newStatus}).eq('id',id);
  if(res.error){showToast('Error moving task','');return}
  showToast('Task moved!',true);
  await loadDB('tasks');
  renderPage();
}

// DRAG & DROP
var draggedTaskId=null;

function dragTask(e,id){
  draggedTaskId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(function(){e.target.style.opacity='.4';e.target.style.transform='rotate(2deg)'},0);
}

function dragEnd(e){
  e.target.style.opacity='1';
  e.target.style.transform='';
  document.querySelectorAll('.kanban-drop').forEach(function(el){el.style.background='';el.style.border=''});
}

function allowDrop(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  var dropZone=e.target.closest('.kanban-drop');
  if(dropZone){
    document.querySelectorAll('.kanban-drop').forEach(function(el){el.style.background='';el.style.border=''});
    dropZone.style.background='rgba(139,115,85,.06)';
    dropZone.style.border='2px dashed var(--ac)';
  }
}

function dropTask(e,status){
  e.preventDefault();
  var id=e.dataTransfer.getData('text/plain')||draggedTaskId;
  document.querySelectorAll('.kanban-drop').forEach(function(el){el.style.background='';el.style.border=''});
  if(id)moveTask(id,status);
  draggedTaskId=null;
}

// TOUCH DRAG (mobile)
var touchDragId=null;
var touchGhost=null;

function touchDragStart(e,id){
  touchDragId=id;
  var card=e.target.closest('[draggable]');
  if(!card)return;
  touchGhost=card.cloneNode(true);
  touchGhost.style.position='fixed';
  touchGhost.style.zIndex='999';
  touchGhost.style.width=card.offsetWidth+'px';
  touchGhost.style.opacity='.8';
  touchGhost.style.transform='rotate(3deg) scale(1.05)';
  touchGhost.style.boxShadow='0 12px 40px rgba(0,0,0,.2)';
  touchGhost.style.pointerEvents='none';
  document.body.appendChild(touchGhost);
  card.style.opacity='.3';
}

function touchDragMove(e){
  if(!touchGhost)return;
  e.preventDefault();
  var touch=e.touches[0];
  touchGhost.style.left=(touch.clientX-60)+'px';
  touchGhost.style.top=(touch.clientY-30)+'px';
  // Highlight drop zones
  document.querySelectorAll('.kanban-drop').forEach(function(el){
    var r=el.getBoundingClientRect();
    if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
      el.style.background='rgba(139,115,85,.06)';el.style.border='2px dashed var(--ac)';
    }else{el.style.background='';el.style.border=''}
  });
}

function touchDragEnd(e){
  if(!touchGhost){touchDragId=null;return}
  var touch=e.changedTouches[0];
  document.querySelectorAll('.kanban-drop').forEach(function(el){
    var r=el.getBoundingClientRect();
    if(touch.clientX>=r.left&&touch.clientX<=r.right&&touch.clientY>=r.top&&touch.clientY<=r.bottom){
      var status=el.getAttribute('data-status');
      if(status&&touchDragId)moveTask(touchDragId,status);
    }
    el.style.background='';el.style.border='';
  });
  touchGhost.remove();touchGhost=null;
  document.querySelectorAll('[draggable]').forEach(function(el){el.style.opacity='1'});
  touchDragId=null;
}

    return'<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:4px;border-left:3px solid '+pc+'"><div style="flex:1"><div style="font-size:12px;font-weight:600;'+(t.status==='done'?'text-decoration:line-through;color:var(--mt)':'')+'">'+t.title+'</div><div style="display:flex;gap:4px;margin-top:3px">'+(t.project_link?'<span class="bd bd-m" style="font-size:8px">'+t.project_link+'</span>':'')+'<span class="bd '+sc+'" style="font-size:8px">'+t.status+'</span>'+(t.assigned_to?'<span style="font-size:8px;color:var(--mt)">'+t.assigned_to+'</span>':'')+'</div></div>'+(showDate&&t.due_date?'<span style="font-size:9px;color:var(--mt)">'+fmtDate(t.due_date)+'</span>':'')+(t.description&&t.description.includes('Est:')?'<span style="font-size:8px;color:var(--ac);background:var(--sf);padding:2px 5px;border-radius:3px">'+t.description.split('Est:')[1].split('|')[0].trim()+'</span>':'')+'<div style="display:flex;gap:2px">'+(t.status!=='done'?'<button class="bt bt-g" style="font-size:8px;padding:2px 5px;color:var(--gn)" onclick="moveTask(\''+t.id+'\',\'done\')">✓</button>':'')+'</div></div>';
  }

  var h='<div class="kr au d1"><div class="kp"><div class="kl">Today</div><div class="kv">'+todayTasks.length+'</div></div><div class="kp"><div class="kl">Overdue</div><div class="kv tr">'+overdue.length+'</div></div><div class="kp"><div class="kl">This Week</div><div class="kv" style="color:var(--bl)">'+thisWeek.length+'</div></div><div class="kp"><div class="kl">Completed</div><div class="kv tg">'+done.length+' / '+db.length+'</div></div></div>';

  if(overdue.length>0){
    h+='<div class="cd au d2" style="border-left:3px solid var(--rd)"><div class="ct-t" style="color:var(--rd);margin-bottom:8px"><span style="color:var(--rd);font-weight:700">!</span> Overdue ('+overdue.length+')</div>';
    overdue.forEach(function(t){h+=taskRow(t,true)});
    h+='</div>';
  }

  h+='<div class="cd au d3" style="margin-top:14px"><div class="ch"><span class="ct-t">Today — '+new Date().toLocaleDateString('en',{weekday:'long',month:'short',day:'numeric'})+'</span><button class="bt bt-p" onclick="openTaskModal()">+ Add Task</button></div>';
  if(todayTasks.length===0)h+='<div style="text-align:center;padding:30px;color:var(--mt);font-size:12px">No tasks due today</div>';
  else todayTasks.forEach(function(t){h+=taskRow(t,false)});
  h+='</div>';

  if(upcoming.length>0){
    h+='<div class="cd au d4" style="margin-top:14px"><div class="ct-t" style="margin-bottom:8px">Upcoming</div>';
    upcoming.forEach(function(t){h+=taskRow(t,true)});
    h+='</div>';
  }
  return h;
}

// TASKS — Productivity View
function pgTasksProd(){
  var db=getAllTasks();
  var done=db.filter(function(t){return t.status==='done'||t.status==='completed'});
  var total=db.length;
  var rate=total>0?Math.round(done.length/total*100):0;

  // By staff
  var byStaff={};db.forEach(function(t){var s=t.assigned_to||'Unassigned';if(!byStaff[s])byStaff[s]={total:0,done:0};byStaff[s].total++;if(t.status==='done'||t.status==='completed')byStaff[s].done++});

  // By project
  var byProj={};db.forEach(function(t){var p=t.project_link||'No Project';if(!byProj[p])byProj[p]={total:0,done:0};byProj[p].total++;if(t.status==='done'||t.status==='completed')byProj[p].done++});

  // By priority
  var byPri={high:0,medium:0,low:0,urgent:0};db.forEach(function(t){var p=t.priority||'medium';byPri[p]=(byPri[p]||0)+1});

  // By status
  var bySt={};db.forEach(function(t){var s=t.status||'todo';bySt[s]=(bySt[s]||0)+1});

  // This week / month / year
  var now=new Date();var todayStr=now.toISOString().slice(0,10);
  var mon=new Date(now);mon.setDate(now.getDate()-((now.getDay()+6)%7));var monStr=mon.toISOString().slice(0,10);
  var sun=new Date(mon);sun.setDate(mon.getDate()+6);var sunStr=sun.toISOString().slice(0,10);
  var weekTasks=db.filter(function(t){return t.due_date&&t.due_date>=monStr&&t.due_date<=sunStr});
  var monthTasks=db.filter(function(t){return t.due_date&&t.due_date.slice(0,7)===todayStr.slice(0,7)});
  var yearTasks=db.filter(function(t){return t.due_date&&t.due_date.slice(0,4)===todayStr.slice(0,4)});

  var h='<div class="kr au d1"><div class="kp"><div class="kl">Completion Rate</div><div class="kv" style="color:'+( rate>70?'var(--gn)':rate>40?'var(--am)':'var(--rd)')+'">'+rate+'%</div><div class="pb" style="margin-top:4px"><div class="pf" style="width:'+rate+'%;background:'+(rate>70?'var(--gn)':rate>40?'var(--am)':'var(--rd)')+'"></div></div></div><div class="kp"><div class="kl">This Week</div><div class="kv">'+weekTasks.length+'</div></div><div class="kp"><div class="kl">This Month</div><div class="kv">'+monthTasks.length+'</div></div><div class="kp"><div class="kl">This Year</div><div class="kv">'+yearTasks.length+'</div></div></div>';

  h+='<div class="g2 au d2">';

  // By Staff
  h+='<div class="cd"><div class="ct-t" style="margin-bottom:10px">By Staff</div>';
  if(Object.keys(byStaff).length===0)h+='<div style="text-align:center;padding:20px;color:var(--mt);font-size:11px">No tasks yet</div>';
  Object.entries(byStaff).sort(function(a,b){return b[1].total-a[1].total}).forEach(function(e){
    var pct=e[1].total>0?Math.round(e[1].done/e[1].total*100):0;
    h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">'+e[0]+'</span><span style="font-size:10px;color:var(--mt)">'+e[1].done+'/'+e[1].total+' ('+pct+'%)</span></div><div class="pb" style="height:6px"><div class="pf" style="width:'+pct+'%;background:'+(pct>70?'var(--gn)':pct>40?'var(--am)':'var(--rd)')+'"></div></div></div>';
  });
  h+='</div>';

  // By Project
  h+='<div class="cd"><div class="ct-t" style="margin-bottom:10px">By Project</div>';
  if(Object.keys(byProj).length===0)h+='<div style="text-align:center;padding:20px;color:var(--mt);font-size:11px">No tasks yet</div>';
  Object.entries(byProj).sort(function(a,b){return b[1].total-a[1].total}).forEach(function(e){
    var pct=e[1].total>0?Math.round(e[1].done/e[1].total*100):0;
    h+='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:600">'+e[0]+'</span><span style="font-size:10px;color:var(--mt)">'+e[1].done+'/'+e[1].total+'</span></div><div class="pb" style="height:6px"><div class="pf" style="width:'+pct+'%;background:var(--ac)"></div></div></div>';
  });
  h+='</div></div>';

  // By Priority & Status
  h+='<div class="g2 au d3" style="margin-top:14px"><div class="cd"><div class="ct-t" style="margin-bottom:10px">By Priority</div>';
  [{l:'Urgent',k:'urgent',c:'var(--rd)'},{l:'High',k:'high',c:'var(--rd)'},{l:'Medium',k:'medium',c:'var(--am)'},{l:'Low',k:'low',c:'var(--mt)'}].forEach(function(p){
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+p.c+'"></div><span style="font-size:11px;flex:1">'+p.l+'</span><span style="font-size:12px;font-weight:700">'+(byPri[p.k]||0)+'</span></div>';
  });
  h+='</div><div class="cd"><div class="ct-t" style="margin-bottom:10px">By Status</div>';
  [{l:'To Do',k:'todo',c:'var(--am)'},{l:'In Progress',k:'in_progress',c:'var(--bl)'},{l:'Blocked',k:'blocked',c:'var(--rd)'},{l:'Done',k:'done',c:'var(--gn)'}].forEach(function(s){
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:8px;height:8px;border-radius:2px;background:'+s.c+'"></div><span style="font-size:11px;flex:1">'+s.l+'</span><span style="font-size:12px;font-weight:700">'+(bySt[s.k]||0)+'</span></div>';
  });
  h+='</div></div>';
  return h;
}

var DEMO_MSGS=[];
var DEMO_CHAT=[];

function getAllMsgs(){return DEMO_MSGS.concat(dbCache.messages||[])}

function getUnreadCount(){return getAllMsgs().filter(function(m){return m.recipient==='Mayriche'&&!m.is_read&&!m.archived}).length}

function pgMsgInbox(){
  var msgs=getAllMsgs().filter(function(m){return m.recipient==='Mayriche'&&!m.archived}).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at)});

  h+='<div class="cd au d2">';
  if(msgs.length===0)h+='<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">Inbox empty</div></div>';
  msgs.forEach(function(m){
    var time=new Date(m.created_at);var timeStr=time.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+time.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    h+='<div onclick="viewMsg(\''+m.id+'\')" style="display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--brd);cursor:pointer;transition:background .15s;'+(m.is_read?'':'background:rgba(139,115,85,.04);')+'" onmouseover="this.style.background=\'rgba(139,115,85,.06)\'" onmouseout="this.style.background=\''+(m.is_read?'':'rgba(139,115,85,.04)')+'\'"><div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--acL),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">'+m.sender.charAt(0)+'</div><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><span style="font-size:12px;font-weight:'+(m.is_read?'400':'700')+'">'+m.sender+'</span><span style="font-size:9px;color:var(--mt)">'+timeStr+'</span></div><div style="font-size:12px;font-weight:'+(m.is_read?'400':'600')+';margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.subject+'</div><div style="font-size:10px;color:var(--mt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+m.body.slice(0,80)+'...</div>'+(m.module?'<span class="bd bd-m" style="font-size:8px;margin-top:3px;display:inline-block">'+m.module+'</span>':'')+'</div>'+(m.is_read?'':'<div style="width:8px;height:8px;border-radius:50%;background:var(--ac);flex-shrink:0;margin-top:4px"></div>')+'</div>';
  });
  h+='</div>';

function viewMsg(id){
  var m=getAllMsgs().find(function(x){return x.id===id});if(!m)return;
  // Mark as read
  if(id.startsWith('dm'))m.is_read=true;
  else sb_client.from('messages').update({is_read:true}).eq('id',id);
  var time=new Date(m.created_at).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
  oM(m.subject,`
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--brd)"><div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--acL),var(--ac));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700">${m.sender.charAt(0)}</div><div><div style="font-size:14px;font-weight:700">${m.sender}</div><div style="font-size:10px;color:var(--mt)">to ${m.recipient} · ${time}</div></div></div>
    <div style="font-size:13px;line-height:1.7;color:var(--tx)">${m.body}</div>
    ${m.module?'<div style="margin-top:14px"><span class="bd bd-m">'+m.module+'</span>'+(m.project?' <span class="bd bd-m">'+m.project+'</span>':'')+'</div>':''}
  `,`<button class="bt bt-s" onclick="cM();archiveMsg('${m.id}')">Archive</button><button class="bt bt-p" onclick="cM();replyMsg('${m.sender}','${m.subject}')">Reply</button><button class="bt bt-s" onclick="cM();renderPage()">Close</button>`);
}

function replyMsg(to,subject){
  nav('messages','compose');
  setTimeout(function(){
    var r=document.getElementById('msgTo');if(r)r.value=to;
    var s=document.getElementById('msgSubject');if(s)s.value='RE: '+subject;
  },100);
}

function archiveMsg(id){
  var m=getAllMsgs().find(function(x){return x.id===id});
  if(m)m.archived=true;
  showToast('Archived',true);renderPage();
}

function pgMsgCompose(){
  return'<div class="cd au d1"><div class="ct-t" style="margin-bottom:14px">New Message</div><div class="fg"><label class="fl">To</label><select class="fi" id="msgTo"><option>All Team</option>'+TEAM.map(function(t){return'<option>'+t.n+'</option>'}).join('')+'</select></div><div class="fg"><label class="fl">Subject</label><input type="text" class="fi" id="msgSubject" placeholder="Subject..."></div><div class="fr"><div class="fg"><label class="fl">Module</label><select class="fi" id="msgModule"><option>general</option><option>finance</option><option>bookings</option><option>appointments</option><option>team</option><option>projects</option></select></div><div class="fg"><label class="fl">Project</label><select class="fi" id="msgProject"><option>— None —</option>'+PROJ.map(function(p){return'<option>'+p.name+'</option>'}).join('')+'</select></div></div><div class="fg"><label class="fl">Message</label><textarea class="fi" id="msgBody" rows="6" placeholder="Write your message..."></textarea></div><div style="display:flex;gap:6px;justify-content:flex-end"><button class="bt bt-s" onclick="nav(\'messages\',\'inbox\')">Cancel</button><button class="bt bt-p" onclick="sendMsg()">Send Message</button></div></div>';
}

async function sendMsg(){
  var to=document.getElementById('msgTo').value;
  var sub=document.getElementById('msgSubject').value||'No subject';
  var body=document.getElementById('msgBody').value;
  var mod=document.getElementById('msgModule').value;
  var proj=document.getElementById('msgProject').value;
  if(!body){showToast('Write a message','');return}
  var ok=await saveToDB('messages',{sender:'Mayriche',recipient:to,subject:sub,body:body,module:mod,project:proj==='— None —'?'':proj,is_read:false});
  if(ok){showToast('Message sent!',true);nav('messages','sent')}
}

function pgMsgSent(){
  var msgs=getAllMsgs().filter(function(m){return m.sender==='Mayriche'}).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at)});
  var h='<div class="cd au d1"><div class="ct-t" style="margin-bottom:10px">Sent Messages ('+msgs.length+')</div>';
  if(msgs.length===0)h+='<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">No sent messages</div></div>';
  msgs.forEach(function(m){
    var time=new Date(m.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    h+='<div onclick="viewMsg(\''+m.id+'\')" style="display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--brd);cursor:pointer" onmouseover="this.style.background=\'rgba(139,115,85,.04)\'" onmouseout="this.style.background=\'\'"><div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-size:11px;font-weight:600">To: '+m.recipient+'</span><span style="font-size:9px;color:var(--mt)">'+time+'</span></div><div style="font-size:11px;margin-top:2px">'+m.subject+'</div></div></div>';

}

function pgMsgArchived(){
  var msgs=getAllMsgs().filter(function(m){return m.archived}).sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at)});
  var h='<div class="cd au d1"><div class="ct-t" style="margin-bottom:10px">Archived ('+msgs.length+')</div>';
  if(msgs.length===0)h+='<div class="empty-state"><div class="empty-icon"></div><div class="empty-title">No archived messages</div></div>';
  msgs.forEach(function(m){
    var time=new Date(m.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    h+='<div style="display:flex;gap:10px;padding:10px 12px;border-bottom:1px solid var(--brd);opacity:.6"><div style="flex:1"><div style="display:flex;justify-content:space-between"><span style="font-size:11px;font-weight:600">'+m.sender+'</span><span style="font-size:9px;color:var(--mt)">'+time+'</span></div><div style="font-size:11px;margin-top:2px">'+m.subject+'</div></div><button class="bt bt-g" style="font-size:9px" onclick="unarchiveMsg(\''+m.id+'\')">Restore</button></div>';
  });
  h+='</div>';return h;

function unarchiveMsg(id){
  var m=getAllMsgs().find(function(x){return x.id===id});if(m)m.archived=false;
  showToast('Restored to inbox',true);renderPage();
}

var chatModule='general';

function pgChat(){

  h+='<div style="font-size:9px;color:var(--mt);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;padding:4px">Channels</div>';

    var active=mod===chatModule;

  });
  h+='</div>';
  // Chat area

  h+='<div style="flex:1;display:flex;flex-direction:column"><div style="padding:12px 16px;border-bottom:1px solid var(--brd);font-weight:600;font-size:13px"># '+chatModule+'</div>';
  h+='<div style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px" id="chatScroll">';
  if(channelMsgs.length===0)h+='<div style="text-align:center;padding:40px;color:var(--mt);font-size:12px">No messages in #'+chatModule+' yet</div>';
  channelMsgs.forEach(function(m){
    var isMe=m.sender==='Mayriche';
    var time=new Date(m.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    h+='<div style="display:flex;gap:8px;'+(isMe?'flex-direction:row-reverse':'')+'">';
    h+='<div style="width:28px;height:28px;border-radius:8px;background:'+(isMe?'linear-gradient(135deg,var(--sb),#3d3225)':'linear-gradient(135deg,var(--acL),var(--ac))')+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">'+m.sender.charAt(0)+'</div>';
    h+='<div style="max-width:70%;'+(isMe?'text-align:right':'')+'"><div style="font-size:9px;color:var(--mt);margin-bottom:2px">'+m.sender+' · '+time+'</div><div style="background:'+(isMe?'var(--sb)':'var(--sf)')+';color:'+(isMe?'#e8ddd0':'var(--tx)')+';padding:8px 12px;border-radius:'+(isMe?'12px 12px 2px 12px':'12px 12px 12px 2px')+';font-size:12px;line-height:1.5;display:inline-block;text-align:left">'+m.message+'</div></div></div>';
  });

  h+='</div></div>';

async function sendChat(){
  var input=document.getElementById('chatInput');
  var msg=input.value.trim();if(!msg)return;
  // Add locally for instant feedback
  DEMO_CHAT.push({id:'dc'+Date.now(),sender:'Mayriche',message:msg,module:chatModule,project:'',created_at:new Date().toISOString()});
  // Also save to DB
  saveToDB('chat_messages',{sender:'Mayriche',message:msg,module:chatModule,project:''});
  input.value='';
  renderPage();

    var tasks=getAllData('tasks');var overdue=tasks.filter(function(t){return t.due_date&&t.due_date<todayStr&&t.status!=='done'&&t.status!=='completed'});
    var todayTasks=tasks.filter(function(t){return t.due_date===todayStr});
    var apts=getAllData('appointments').filter(function(a){return a.appointment_date===todayStr});
    var bk=getAllData('bookings');var pending=bk.filter(function(b){return b.payment_status==='pending'});

    if(todayTasks.length>0)brief+='<div style="color:'+(todayTasks.length>3?'var(--rd)':'var(--am)')+';font-weight:600">'+todayTasks.length+' tasks due today</div>';
    if(apts.length>0)brief+='<div style="color:var(--gn)">'+apts.length+' appointments today — confirmed</div>';
    brief+='<div style="color:'+(getUnreadCount()>0?'var(--am)':'var(--mt)')+'">'+getUnreadCount()+' unread messages</div>';
    if(pending.length>0)brief+='<div style="color:var(--rd);font-weight:600">'+pending.length+' pending payments — '+fmtMoney(pending.reduce(function(s,b){return s+parseFloat(b.price||0)},0))+' to collect</div>';

    brief+='<div style="color:'+(rev-expT>=0?'var(--gn)':'var(--rd)')+';font-weight:600">Net Profit: '+fmtMoney(rev-expT)+'</div>';
    var topCat={};exp.forEach(function(e){topCat[e.category]=(topCat[e.category]||0)+parseFloat(e.amount||0)});
    var top=Object.entries(topCat).sort(function(a,b){return b[1]-a[1]})[0];
    if(top)brief+='<div style="color:var(--am)">Top expense: '+top[0]+' ('+fmtMoney(top[1])+')</div>';
  }else if(curMod==='clients'||curMod==='bookings'){
    var bk=getAllData('bookings');
    var todayBk=bk.filter(function(b){return b.booking_date===todayStr});
    var pending=bk.filter(function(b){return b.payment_status==='pending'});

    brief+='<div style="color:'+(pending.length>0?'var(--rd)':'var(--gn)')+';font-weight:'+(pending.length>0?'600':'400')+'">'+pending.length+' pending payments</div>';
    brief+='<div style="color:var(--mt)">'+inHouse+' in-house · '+mobile+' mobile</div>';

    var done=tasks.filter(function(t){return t.status==='done'||t.status==='completed'}).length;

    brief+=''+getAllMsgs().filter(function(m){return m.sender==='Mayriche'}).length+' sent<br>';
  }else if(curMod==='projects'){
    var active=PROJ.filter(function(p){return p.status==='active'||p.status==='in progress'});
    brief+='<div style="color:var(--gn)">'+active.length+' active projects</div>';
    active.forEach(function(p){brief+='<div style="color:'+(p.status==='in progress'?'var(--bl)':'var(--gn)')+'">'+p.name+' — '+p.status+'</div>'});

    brief+='<div style="color:var(--mt)">You are in '+modLabel+'</div>';
    brief+='<div style="color:var(--am)">'+getAllData('tasks').filter(function(t){return t.status!=="done"}).length+' pending tasks</div>';
  }

  var tips={Monday:'Strategy day — review goals and plan the week.',Tuesday:'Operations — check schedules and team capacity.',Wednesday:'Creative — review marketing and content.',Thursday:'Outreach — follow up with clients and partners.',Friday:'Review — prepare weekly report and close tasks.',Saturday:'Light day — quick review and plan ahead.'};
  brief+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--brd);font-style:italic;color:var(--ac)">— '+(tips[dayName]||'Have a productive day!')+'</div>';
  brief+='</div></div>';

  // Module-specific quick asks
  var suggestions=[];
  if(curMod==='finance')suggestions=['What are my biggest expenses?','How can I increase profit?','Forecast next month revenue','Compare this week vs last'];
  else if(curMod==='tasks')suggestions=['What should I prioritise?','Which tasks are overdue?','Summarise progress this week','Suggest delegation'];
  else if(curMod==='clients'||curMod==='bookings')suggestions=['How are bookings trending?','Which lady performs best?','Predict next week bookings','Suggest pricing changes'];
  else if(curMod==='team')suggestions=['Team performance overview','Who is overloaded?','Suggest schedule optimisation','Training recommendations'];
  else if(curMod==='projects')suggestions=['Project status summary','Which project needs attention?','Resource allocation advice','Timeline risk analysis'];

  brief+='<div style="font-size:9px;color:var(--mt);margin-bottom:6px;letter-spacing:.06em">SUGGESTIONS · '+modLabel.toUpperCase()+'</div>';

  });

  el.innerHTML=brief;
}

function getAIContext(){
  var modLabel=MODULES[curMod]?MODULES[curMod].label:curMod;
  var ctx='CURRENT VIEW: '+modLabel+(curSub?' > '+curSub:'')+'\n';
  ctx+='DATE: '+new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+'\n\n';
  ctx+='BUSINESS OVERVIEW:\n';
  var tasks=getAllData('tasks');
  ctx+='- Tasks: '+tasks.length+' total, '+tasks.filter(function(t){return t.status==='todo'||t.status==='to_do'}).length+' todo, '+tasks.filter(function(t){return t.status==='in_progress'}).length+' in progress, '+tasks.filter(function(t){return t.status==='done'||t.status==='completed'}).length+' done\n';
  var bk=getAllData('bookings');
  ctx+='- Bookings: '+bk.length+' total, £'+bk.reduce(function(s,b){return s+parseFloat(b.price||0)},0).toFixed(0)+' revenue\n';
  var exp=getAllData('expenses');
  ctx+='- Expenses: £'+exp.reduce(function(s,e){return s+parseFloat(e.amount||0)},0).toFixed(0)+'\n';
  ctx+='- Appointments today: '+getAllData('appointments').filter(function(a){return a.appointment_date===new Date().toISOString().slice(0,10)}).length+'\n';
  ctx+='- Unread messages: '+getUnreadCount()+'\n';
  ctx+='- Team: '+TEAM.map(function(t){return t.n+' ('+t.rl+')'}).join(', ')+'\n';
  ctx+='- Active projects: '+PROJ.filter(function(p){return p.status==='active'||p.status==='in progress'}).map(function(p){return p.name}).join(', ')+'\n';
  // Module-specific context
  if(curMod==='finance'){ctx+='\nFINANCE DETAIL:\n';exp.slice(0,5).forEach(function(e){ctx+='- '+e.title+': £'+e.amount+' ('+e.category+')\n'})}
  if(curMod==='tasks'){ctx+='\nTASKS DETAIL:\n';tasks.filter(function(t){return t.status!=='done'}).slice(0,8).forEach(function(t){ctx+='- ['+t.status+'] '+t.title+(t.assigned_to?' ('+t.assigned_to+')':'')+'\n'})}

  return ctx;
}

async function askAI(){
  var input=document.getElementById('aiInput');
  var q=input.value.trim();if(!q)return;
  var key=localStorage.getItem('mayriche_ai_key');
  if(!key){showToast('Set API key in Settings → APIs','');return}
  var chatEl=document.getElementById('aiChat');
  chatEl.innerHTML+='<div style="text-align:right;margin-bottom:8px"><div style="display:inline-block;background:var(--sb);color:#2d2418;padding:8px 12px;border-radius:12px 12px 2px 12px;font-size:12px;max-width:80%">'+q+'</div></div>';
  input.value='';
  chatEl.innerHTML+='<div style="margin-bottom:8px"><div style="display:inline-block;background:var(--sf);padding:8px 12px;border-radius:12px 12px 12px 2px;font-size:12px;color:var(--mt)">Thinking...</div></div>';
  chatEl.scrollTop=chatEl.scrollHeight;
  try{
    var lang=localStorage.getItem('mayriche_ai_lang')||'English';
    var langEl=document.getElementById('aiLang');if(langEl&&lang)langEl.value=lang;
    var modLabel=MODULES[curMod]?MODULES[curMod].label:curMod;
    var subLabel=curSub?' → '+curSub:'';
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:'You are the AI assistant for Mayriche Business OS — a luxury wellness business management platform. You help the CEO with strategy, analysis, and decisions. Be concise, professional, and actionable. IMPORTANT: Always respond in '+lang+'. CONTEXT: The user is currently viewing the "'+modLabel+subLabel+'" section. Only discuss data and insights relevant to this specific section. Do not mix data from other sections. Here is the current data context:\n'+getAIContext(),messages:[{role:'user',content:q}]})});
    var data=await res.json();
    var answer=data.content?data.content[0].text:'Error: '+JSON.stringify(data.error||data);
    // Remove "Thinking..." and add real answer
    var msgs=chatEl.querySelectorAll(':scope > div');
    if(msgs.length>0)msgs[msgs.length-1].remove();
    chatEl.innerHTML+='<div style="margin-bottom:8px"><div style="display:inline-block;background:var(--sf);padding:10px 14px;border-radius:12px 12px 12px 2px;font-size:12px;max-width:85%;line-height:1.6;white-space:pre-wrap">'+answer.replace(/</g,'&lt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</div></div>';
  }catch(e){
    var msgs=chatEl.querySelectorAll(':scope > div');
    if(msgs.length>0)msgs[msgs.length-1].remove();
    chatEl.innerHTML+='<div style="margin-bottom:8px"><div style="display:inline-block;background:var(--rdB);color:var(--rd);padding:8px 12px;border-radius:12px;font-size:11px">Error: '+e.message+'</div></div>';
  }
  chatEl.scrollTop=chatEl.scrollHeight;
}

async function startMFASetup(){
  var area=document.getElementById('mfaSetupArea');
  if(!area)return;
  area.innerHTML='<div style="padding:10px;color:var(--mt);font-size:11px">Setting up...</div>';
  try{
    // Clean unverified factors first
    var factors=await sb_client.auth.mfa.listFactors();
    var totpFactors=(factors.data&&factors.data.totp)||[];
    for(var i=0;i<totpFactors.length;i++){
      if(totpFactors[i].status!=='verified'){
        try{await sb_client.auth.mfa.unenroll({factorId:totpFactors[i].id})}catch(ue){}
      }
    }
    var verified=totpFactors.filter(function(f){return f.status==='verified'});
    if(verified.length>0){
      area.innerHTML='<div style="padding:10px;background:var(--gnB);color:var(--gn);border-radius:8px;font-size:11px;margin-bottom:10px">2FA is already active! Your login is protected by Google Authenticator.</div>';
      return;
    }
    var enroll=await sb_client.auth.mfa.enroll({factorType:'totp',issuer:'Mayriche Business OS',friendlyName:'Mayriche-'+Date.now()});
    if(enroll.error){
      area.innerHTML='<div style="padding:10px;background:var(--rdB);color:var(--rd);border-radius:8px;font-size:11px;margin-bottom:10px">Error: '+enroll.error.message+'</div>';

    var qrImg=document.getElementById('mfaSettingsQR');
    if(qrImg)qrImg.src=enroll.data.totp.qr_code;
    var secretEl=document.getElementById('mfaSettingsSecret');
    if(secretEl)secretEl.textContent=enroll.data.totp.secret;
  }catch(e){
    area.innerHTML='<div style="padding:10px;background:var(--rdB);color:var(--rd);border-radius:8px;font-size:11px;margin-bottom:10px">Error: '+(e.message||'Unknown')+'</div>';
  }
}

async function verifyMFASettings(factorId){
  var code=document.getElementById('mfaSettingsCode').value.trim();
  if(!code||code.length!==6){showToast('Enter 6-digit code','');return}
  try{
    var challenge=await sb_client.auth.mfa.challenge({factorId:factorId});
    if(challenge.error){showToast('Error: '+challenge.error.message,'');return}
    var verify=await sb_client.auth.mfa.verify({factorId:factorId,challengeId:challenge.data.id,code:code});
    if(verify.error){showToast('Wrong code — try again','');document.getElementById('mfaSettingsCode').value='';return}
    showToast('2FA activated! Next login will require your code.',true);
    var area=document.getElementById('mfaSetupArea');
    if(area)area.innerHTML='<div style="padding:10px;background:var(--gnB);color:var(--gn);border-radius:8px;font-size:11px;margin-bottom:10px">2FA is ACTIVE. Every login now requires your Google Authenticator code.</div>';
    checkMFAStatus();
  }catch(e){showToast('Error: '+(e.message||''),'');}
}

  h+='<div class="g2 au d4" style="margin-top:14px">';

  Object.entries(byTherapist).sort(function(a,b){return b[1].rev-a[1].rev}).forEach(function(e){

var flowState={running:false,seconds:0,totalToday:0,pomoCount:0,pomoRound:0,mode:'pomo',startTime:null,interval:null,pausedFrom:null};

function flowInit(){
  flowState.startTime=new Date();
  flowState.running=true;
  flowState.mode='pomo';
  flowState.seconds=0;
  flowState.interval=setInterval(flowTick,1000);
  flowUpdateUI();
  showToast('Session 1/4 — your time has started',true);
}

function flowTick(){
  if(!flowState.running)return;
  flowState.seconds++;
  if(flowState.mode==='pomo')flowState.totalToday++;
  if(flowState.mode==='pomo'){
    if(flowState.seconds>=25*60){
      flowState.pomoRound++;flowState.pomoCount++;flowPlayChime();
      if(flowState.pomoRound>=4){
        flowState.mode='longbreak';flowState.seconds=0;flowState.pomoRound=0;
        showToast('Long break — 30 min, you earned it!',true);
      } else {
        flowState.mode='shortbreak';flowState.seconds=0;
        showToast('Short break — 5 min',true);
      }
    }
  } else if(flowState.mode==='shortbreak'){
    if(flowState.seconds>=5*60){
      flowPlayChime();flowState.mode='pomo';flowState.seconds=0;
      showToast('Session '+(flowState.pomoRound+1)+'/4 — focus',true);
    }
  } else if(flowState.mode==='longbreak'){
    if(flowState.seconds>=30*60){
      flowPlayChime();flowState.mode='pomo';flowState.seconds=0;
      showToast('New cycle — Session 1/4',true);
    }
  }
  flowUpdateUI();
}

function flowFmtTime(s){var m=Math.floor(s/60);var sc=s%60;return(m<10?'0':'')+m+':'+(sc<10?'0':'')+sc;}
function flowFmtHM(s){var h=Math.floor(s/3600);var m=Math.floor((s%3600)/60);return h>0?h+'h '+m+'m':m+'m';}

function flowUpdateUI(){
  var bar=document.getElementById('pomoBar');
  if(!bar)return;
  var mode=flowState.mode;
  var dur=mode==='pomo'?25*60:mode==='shortbreak'?5*60:mode==='longbreak'?30*60:25*60;
  var left=dur-flowState.seconds;if(left<0)left=0;
  var prog=dur>0?((flowState.seconds/dur)*100):0;
  var pCol=mode==='pomo'?'#5d8c72':mode==='shortbreak'?'#6a89b0':mode==='longbreak'?'#9b7bc4':mode==='paused'?'#b8923e':'#5d8c72';
  var pLbl=mode==='pomo'?'Focus':mode==='shortbreak'?'Break':mode==='longbreak'?'Long Break':mode==='paused'?'Paused':'Focus';
  var sess=flowState.pomoRound+1;if(sess>4)sess=4;
  var circ=2*Math.PI*12;
  var h='<div class="pb-line"><div class="pb-fill" style="width:'+prog+'%;background:'+pCol+'"></div></div>';
  h+='<div class="pb-inner">';
  // SVG circle timer
  h+='<div style="position:relative;width:28px;height:28px;flex-shrink:0">';
  h+='<svg width="28" height="28" viewBox="0 0 28 28" style="transform:rotate(-90deg)"><circle cx="14" cy="14" r="12" fill="none" stroke="rgba(196,168,130,.12)" stroke-width="2"/><circle cx="14" cy="14" r="12" fill="none" stroke="'+pCol+'" stroke-width="2" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*(1-prog/100))+'" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg>';
  h+='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:'+pCol+';font-family:var(--fd)">'+flowFmtTime(left)+'</div>';
  h+='</div>';
  // Badge
  h+='<span class="pb-badge" style="background:'+pCol+'20;color:'+pCol+'">'+pLbl+'</span>';
  // Session info
  h+='<span style="color:#2d2418;font-size:9px">Session '+sess+'/4</span>';
  h+='<span style="flex:1"></span>';
  // Stats
  h+='<span class="pb-stats" style="color:#a68b6b;font-size:9px">Focus: <b style="color:#2d2418">'+flowFmtHM(flowState.totalToday)+'</b></span>';
  h+='<span class="pb-stats" style="color:#a68b6b;font-size:9px">Done: <b style="color:#2d2418">'+flowState.pomoCount+'</b></span>';
  // Session dots
  h+='<div style="display:flex;gap:3px">';
  for(var i=0;i<4;i++){
    var done=i<flowState.pomoRound||(i===flowState.pomoRound&&(mode==='shortbreak'||mode==='longbreak'));
    var cur=i===flowState.pomoRound&&(mode==='pomo'||mode==='paused');
    h+='<div class="pb-dot" style="background:'+(done?'#5d8c72':cur?pCol+'50':'transparent')+';border:1.5px solid '+(done?'#5d8c72':cur?pCol:'rgba(196,168,130,.2)')+'"></div>';
  }
  h+='</div>';
  // Controls
  h+='<div style="display:flex;gap:2px">';
  h+='<button class="pb-btn" onclick="flowTogglePause()" title="'+(flowState.running?'Pause':'Resume')+'">'+(flowState.running?'❚❚':'▶')+'</button>';
  h+='<button class="pb-btn" onclick="flowSkip()" title="Skip" style="font-size:7px">▶▶</button>';
  h+='<button class="pb-btn" onclick="flowReset()" title="Reset">↺</button>';
  h+='</div>';
  h+='</div>';
  bar.innerHTML=h;
  // Sidebar Focus widget
  var sw=document.getElementById('sbFocusWidget');
  if(sw){
    var wh='<div style="padding:7px 8px;border-radius:7px;background:'+pCol+'12;border:1px solid '+pCol+'25;cursor:pointer;display:flex;align-items:center;gap:7px">';
    wh+='<div style="position:relative;width:26px;height:26px;flex-shrink:0">';
    wh+='<svg width="26" height="26" viewBox="0 0 26 26" style="transform:rotate(-90deg)"><circle cx="13" cy="13" r="11" fill="none" stroke="'+pCol+'30" stroke-width="2"/><circle cx="13" cy="13" r="11" fill="none" stroke="'+pCol+'" stroke-width="2" stroke-dasharray="'+(2*Math.PI*11)+'" stroke-dashoffset="'+(2*Math.PI*11*(1-prog/100))+'" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/></svg>';
    wh+='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;color:'+pCol+';font-family:var(--fd)">'+flowFmtTime(left)+'</div>';
    wh+='</div>';
    wh+='<div style="flex:1;min-width:0"><div style="font-size:8px;font-weight:700;color:'+pCol+';text-transform:uppercase;letter-spacing:.5px">'+pLbl+'</div>';
    wh+='<div style="font-size:8px;color:#a68b6b">'+sess+'/4 · '+flowFmtHM(flowState.totalToday)+'</div></div>';
    var fp=document.getElementById('focusPanel');
    wh+='<span style="font-size:8px;color:#a68b6b;transform:rotate('+(fp&&fp.style.display!=='none'?'180':'0')+'deg);transition:transform .2s">▼</span>';
    wh+='</div>';
    sw.innerHTML=wh;
  }
  // Focus panel content (if open)
  var fp=document.getElementById('focusPanel');
  if(fp&&fp.style.display!=='none'){
    var dProg=Math.min((flowState.totalToday/(8*3600))*100,100);
    var ph='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-family:var(--fd);font-size:12px;font-weight:600;color:#c4a882;letter-spacing:.5px;text-transform:uppercase">Focus Session</span><button onclick="event.stopPropagation();toggleFocusPanel()" style="background:none;border:none;color:#a68b6b;font-size:9px;cursor:pointer">Close</button></div>';
    ph+='<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:8px;color:#a68b6b">Daily goal: 8h</span><span style="font-size:8px;color:#c4a882;font-weight:600">'+Math.round(dProg)+'%</span></div>';
    ph+='<div style="height:3px;background:rgba(196,168,130,.1);border-radius:2px;overflow:hidden;margin-bottom:10px"><div style="height:100%;background:linear-gradient(90deg,#8b7355,#5d8c72);width:'+dProg+'%;border-radius:2px"></div></div>';
    // Cycle map
    ph+='<div style="display:flex;gap:3px;margin-bottom:6px">';
    for(var ci=0;ci<4;ci++){
      var cdone=ci<flowState.pomoRound||(ci===flowState.pomoRound&&(mode==='shortbreak'||mode==='longbreak'));
      var ccur=ci===flowState.pomoRound&&(mode==='pomo'||mode==='paused');
      ph+='<div style="flex:1;border-radius:4px;padding:4px 2px;text-align:center;background:'+(cdone?'rgba(93,140,114,.08)':ccur?pCol+'08':'rgba(196,168,130,.04)')+';border:0.5px solid '+(cdone?'rgba(93,140,114,.2)':ccur?pCol+'25':'rgba(196,168,130,.08)')+';position:relative;overflow:hidden">';
      if(ccur&&mode==='pomo')ph+='<div style="position:absolute;bottom:0;left:0;height:2px;background:#5d8c72;width:'+prog+'%"></div>';
      ph+='<div style="font-size:7px;color:'+(cdone?'#5d8c72':ccur?pCol:'#a68b6b')+';font-weight:600;text-transform:uppercase">'+(cdone?'Done':ccur?'Now':(ci+1))+'</div>';
      ph+='<div style="font-family:var(--fd);font-size:11px;font-weight:600;color:'+(cdone?'#5d8c72':ccur?'#e8ddd0':'#a68b6b')+'">'+( cdone?'✓':ccur?flowFmtTime(left):'25:00')+'</div>';
      ph+='</div>';
    }
    ph+='</div>';
    // Long break indicator
    ph+='<div style="padding:4px 8px;border-radius:4px;background:'+(mode==='longbreak'?'rgba(155,123,196,.05)':'rgba(196,168,130,.04)')+';border:0.5px solid '+(mode==='longbreak'?'rgba(155,123,196,.15)':'rgba(196,168,130,.08)')+';display:flex;justify-content:space-between;margin-bottom:8px">';
    ph+='<span style="font-size:8px;color:'+(mode==='longbreak'?'#9b7bc4':'#a68b6b')+'">Long break · 30m</span>';
    ph+='<span style="font-family:var(--fd);font-size:10px;font-weight:600;color:'+(mode==='longbreak'?'#9b7bc4':'#a68b6b')+'">'+(mode==='longbreak'?flowFmtTime(left):'30:00')+'</span></div>';
    // KPIs
    ph+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
    ph+='<div style="background:rgba(196,168,130,.04);border-radius:4px;padding:5px;text-align:center"><div style="font-size:6px;color:#a68b6b;text-transform:uppercase;letter-spacing:.5px">Sessions</div><div style="font-family:var(--fd);font-size:14px;font-weight:700;color:#2d2418">'+flowState.pomoCount+'</div></div>';
    ph+='<div style="background:rgba(196,168,130,.04);border-radius:4px;padding:5px;text-align:center"><div style="font-size:6px;color:#a68b6b;text-transform:uppercase;letter-spacing:.5px">Focus</div><div style="font-family:var(--fd);font-size:14px;font-weight:700;color:#5d8c72">'+flowFmtHM(flowState.totalToday)+'</div></div>';
    ph+='</div>';
    fp.innerHTML=ph;
  }
}

function toggleFocusPanel(){
  var fp=document.getElementById('focusPanel');
  if(!fp)return;
  fp.style.display=fp.style.display==='none'?'block':'none';
  flowUpdateUI();
}

function flowTogglePause(){
  if(flowState.running){
    flowState.running=false;
    flowState.pausedFrom=flowState.mode;
    flowState.mode='paused';
  } else if(flowState.mode==='paused'&&flowState.pausedFrom){
    flowState.mode=flowState.pausedFrom;
    flowState.pausedFrom=null;
    flowState.running=true;
  }
  flowUpdateUI();
}

function flowSkip(){
  flowState.running=false;
  // Simulate end of current phase
  if(flowState.mode==='pomo'){
    flowState.pomoRound++;flowState.pomoCount++;
    if(flowState.pomoRound>=4){
      flowState.mode='longbreak';flowState.seconds=0;flowState.pomoRound=0;
      showToast('Long break — 30 min',true);
    } else {
      flowState.mode='shortbreak';flowState.seconds=0;
      showToast('Short break — 5 min',true);
    }
  } else if(flowState.mode==='shortbreak'){
    flowState.mode='pomo';flowState.seconds=0;
    showToast('Session '+(flowState.pomoRound+1)+'/4 — focus',true);
  } else if(flowState.mode==='longbreak'){
    flowState.mode='pomo';flowState.seconds=0;
    showToast('New cycle — Session 1/4',true);
  } else if(flowState.mode==='paused'&&flowState.pausedFrom){
    flowState.mode=flowState.pausedFrom;flowState.pausedFrom=null;
  }
  flowState.running=true;
  flowUpdateUI();
}

function flowReset(){
  flowState.seconds=0;flowState.pomoRound=0;flowState.mode='pomo';
  flowState.pausedFrom=null;flowState.running=true;
  flowUpdateUI();
  showToast('Cycle reset — Session 1/4',true);
}

function flowStartPomo(){
  flowState.mode='pomo';flowState.seconds=0;flowState.running=true;
  flowUpdateUI();
}

function flowTogglePanel(){}

function flowPlayChime(){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    var o=ctx.createOscillator();var g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=800;o.type='sine';
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.8);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+0.8);
    setTimeout(function(){
      var o2=ctx.createOscillator();var g2=ctx.createGain();
      o2.connect(g2);g2.connect(ctx.destination);
      o2.frequency.value=1000;o2.type='sine';
      g2.gain.setValueAtTime(0.12,ctx.currentTime);
      g2.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.6);
      o2.start(ctx.currentTime);o2.stop(ctx.currentTime+0.6);
    },300);
  }catch(e){}
}

setTimeout(flowInit,1000);
</script>
